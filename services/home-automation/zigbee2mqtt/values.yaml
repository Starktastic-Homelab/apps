controllers:
  main:
    strategy: Recreate
    containers:
      main:
        image:
          repository: ghcr.io/koenkk/zigbee2mqtt
          tag: 2.9.1
          digest: sha256:574b2bd0dcbb59fae6edbbb81a35b5563291d3825da0225f0078aa5575dac37f
        env:
          ZIGBEE2MQTT_CONFIG_MQTT_SERVER: "mqtt://mosquitto.home-automation.svc.cluster.local:1883"
          ZIGBEE2MQTT_CONFIG_HOMEASSISTANT_ENABLED: "true"
          ZIGBEE2MQTT_CONFIG_FRONTEND_PORT: "8080"
          ZIGBEE2MQTT_CONFIG_SERIAL_PORT: "tcp://10.9.9.20:3333"
          ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER: "ember"
          ZIGBEE2MQTT_CONFIG_SERIAL_BAUDRATE: "115200"
          ZIGBEE2MQTT_CONFIG_SERIAL_RTSCTS: "false"
          ZIGBEE2MQTT_CONFIG_ADVANCED_WATCHDOG: "true"
        securityContext:
          privileged: false
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8080
          readiness:
            enabled: true
            type: TCP
            port: 8080
          startup:
            enabled: true
            type: TCP
            port: 8080
            spec:
              failureThreshold: 60
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8080

persistence:
  config:
    enabled: false
  zigbee2mqtt-config:
    existingClaim: zigbee2mqtt-config
    globalMounts:
      - path: /app/data
  media:
    enabled: false
