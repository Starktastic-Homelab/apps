controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/autobrr/autobrr
          tag: v1.75.0@sha256:c7edec5fc23326b87e0b71c4c6c011223f53aa17d17ad8d15df81d0c7e021d85
        env:
          AUTOBRR__HOST: "0.0.0.0"
          AUTOBRR__PORT: "7474"
          AUTOBRR__CHECK_FOR_UPDATES: "false"
          # OIDC with Authentik
          AUTOBRR__OIDC_ENABLED: "true"
          AUTOBRR__OIDC_ISSUER: "https://auth.starktastic.net/application/o/autobrr/" # source: globals.yaml → global.domains.public
          AUTOBRR__OIDC_REDIRECT_URL: "https://autobrr.internal.starktastic.net/api/auth/oidc/callback" # source: globals.yaml → global.domains.internal
          AUTOBRR__OIDC_DISABLE_BUILT_IN_LOGIN: "false"
        envFrom:
          - secretRef:
              name: autobrr-secret
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /api/healthz/liveness
            port: 7474
          readiness:
            enabled: true
            type: HTTP
            path: /api/healthz/readiness
            port: 7474
          startup:
            enabled: true
            type: HTTP
            path: /api/healthz/liveness
            port: 7474
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 7474
