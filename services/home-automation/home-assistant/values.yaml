controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/home-assistant/home-assistant
          tag: 2026.3.2
          digest: sha256:572a5d030f652e9ef6c6d4f6631169af83eb3b739c9b4b3965669f5e9d9f3858
        env:
          PUID: null
          PGID: null
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8123
          readiness:
            enabled: true
            type: TCP
            port: 8123
          startup:
            enabled: true
            type: TCP
            port: 8123
            spec:
              initialDelaySeconds: 10
              failureThreshold: 60
              periodSeconds: 10

defaultPodOptions:
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  securityContext:
    fsGroup: 0

service:
  main:
    controller: main
    ports:
      http:
        port: 8123
  lan:
    controller: main
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      kube-vip.io/loadbalancerIPs: "{{ .Values.global.network.loadBalancers.homeAssistant }}"
    ports:
      http:
        port: 8123
      mdns:
        port: 5353
        protocol: UDP

persistence:
  config:
    enabled: false
  home-assistant-config:
    existingClaim: home-assistant-config
    globalMounts:
      - path: /config
  media:
    enabled: false
