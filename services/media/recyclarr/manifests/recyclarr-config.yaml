---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
data:
  recyclarr.yml: |
    # yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json

    radarr:
      radarr_main:
        base_url: http://radarr.media.svc.cluster.local:7878
        api_key: !env_var RADARR_API_KEY

        delete_old_custom_formats: true

        include:
          - template: radarr-quality-definition-movie
          - template: radarr-quality-profile-uhd-bluray-web
          - template: radarr-custom-formats-uhd-bluray-web

        media_naming:
          folder: default
          movie:
            rename: true
            standard: standard

        # Audio formats (not included in templates — uses TRaSH default scores)
        custom_formats:
          - trash_ids:
              - 496f355514737f7d83bf7aa4d24f8169 # TrueHD ATMOS
              - 2f22d89048b01681dde8afe203bf2e95 # DTS X
              - 417804f7f2c4308c1f4c5d380d4c4475 # ATMOS (undefined)
              - 1af239278386be2919e1bcee0bde047e # DD+ ATMOS
              - 3cafb66171b47f226146a0770576870f # TrueHD
              - dcf3ec6938fa32445f590a4da84256cd # DTS-HD MA
              - a570d4a0e56a2874b64e5bfa55202a1b # FLAC
              - e7c2fcae07cbada050a0af3357491d7b # PCM
              - 8e109e50e0a0b83a5098b056e13bf6db # DTS-HD HRA
              - 185f1dd7264c4562b9022d963ac37424 # DD+
              - f9f847ac70a0af62ea4a08280b859636 # DTS-ES
              - 1c1a4c5e823891c75bc50380a6866f73 # DTS
              - 240770601cc226190c367ef59aba7463 # AAC
              - c2998bd0d90ed5621d8df281e839436e # DD
            assign_scores_to:
              - name: UHD Bluray + WEB

        # Override template quality profile: extend ladder down to 720p and upgrade to Remux-2160p
        quality_profiles:
          - name: UHD Bluray + WEB
            upgrade:
              until_quality: Remux-2160p
            qualities:
              - name: Remux-2160p
              - name: Bluray-2160p
              - name: WEB 2160p
                qualities:
                  - WEBDL-2160p
                  - WEBRip-2160p
              - name: Remux-1080p
              - name: Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: Bluray-720p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p

      radarr_ru:
        base_url: http://radarr-ru.media.svc.cluster.local:7878
        api_key: !env_var RADARR_RU_API_KEY
        delete_old_custom_formats: true

        include:
          - template: radarr-quality-definition-movie

        media_naming:
          folder: default
          movie:
            rename: true
            standard: standard

        custom_formats:
          - trash_ids:
              - 923b6abef9b17f937fab56cfcf89e1f1 # DV (w/o HDR fallback)
            assign_scores_to:
              - name: WEB 1080p
                score: -10000

          - trash_ids:
              - ed38b889b31be83fda192888e2286d83 # BR-DISK
              - 90a6f9a284dff5103f6346090e6280c8 # LQ
              - e204b80c87be9497a8a6eaff48f72905 # LQ (Release Title)
            assign_scores_to:
              - name: WEB 1080p

        quality_profiles:
          - name: WEB 1080p
            min_format_score: 0
            quality_sort: top
            upgrade:
              allowed: true
              until_quality: WEB 1080p
              until_score: 10000
            qualities:
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: HDTV-1080p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
              - name: HDTV-720p
            reset_unmatched_scores:
              enabled: true

    sonarr:
      sonarr_main:
        base_url: http://sonarr.media.svc.cluster.local:8989
        api_key: !env_var SONARR_API_KEY

        delete_old_custom_formats: true

        include:
          - template: sonarr-quality-definition-series
          - template: sonarr-v4-quality-profile-web-2160p
          - template: sonarr-v4-custom-formats-web-2160p
          - template: sonarr-v4-quality-profile-anime
          - template: sonarr-v4-custom-formats-anime

        media_naming:
          series: default
          season: default
          episodes:
            rename: true
            standard: default
            daily: default
            anime: default

        custom_formats:
          # Override anime template defaults
          - trash_ids:
              - b2550eb333d27b75833e25b8c2557b38 # 10bit
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 0

          - trash_ids:
              - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 0

          # Unwanted formats for the anime profile (not included in anime template)
          - trash_ids:
              - 85c61753df5da1fb2aab6f2a47426b09 # BR-DISK
              - 9c11cd3f07101cdba90a2d81cf0e56b4 # LQ
              - e2315f990da2e2cbfc9fa5b7a6fcfe48 # LQ (Release Title)
              - fbcb31d8dabd2a319072b84fc0b7249c # Extras
              - 15a05bc7c1a36e2b57fd628f8977e2fc # AV1
            assign_scores_to:
              - name: Remux-1080p - Anime

          # Audio formats (not included in templates — uses TRaSH default scores)
          - trash_ids:
              - 0d7824bb924701997f874e7ff7d4844a # TrueHD ATMOS
              - 9d00418ba386a083fbf4d58235fc37ef # DTS X
              - b6fbafa7942952a13e17e2b1152b539a # ATMOS (undefined)
              - 4232a509ce60c4e208d13825b7c06264 # DD+ ATMOS
              - 1808e4b9cee74e064dfae3f1db99dbfe # TrueHD
              - c429417a57ea8c41d57e6990a8b0033f # DTS-HD MA
              - 851bd64e04c9374c51102be3dd9ae4cc # FLAC
              - 30f70576671ca933adbdcfc736a69718 # PCM
              - cfa5fbd8f02a86fc55d8d223d06a5e1f # DTS-HD HRA
              - 63487786a8b01b7f20dd2bc90dd4a477 # DD+
              - c1a25cd67b5d2e08287c957b1eb903ec # DTS-ES
              - 5964f2a8b3be407d083498e4459d05d0 # DTS
              - a50b8a0c62274a7c38b09a9619ba9d86 # AAC
              - dbe00161b08a25ac6154c55f95e6318d # DD
            assign_scores_to:
              - name: WEB-2160p
              - name: Remux-1080p - Anime

        # Override template quality profiles with custom quality ladders
        quality_profiles:
          - name: WEB-2160p
            upgrade:
              until_quality: Bluray-2160p Remux
            qualities:
              - name: Bluray-2160p Remux
              - name: WEB 2160p
                qualities:
                  - WEBDL-2160p
                  - WEBRip-2160p
              - name: Bluray-1080p Remux
              - name: Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: HDTV-1080p
              - name: Bluray-720p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
              - name: HDTV-720p

          - name: Remux-1080p - Anime
            min_format_score: 100
            upgrade:
              until_quality: Bluray-1080p
            qualities:
              - name: Bluray-1080p
                qualities:
                  - Bluray-1080p Remux
                  - Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
                  - HDTV-1080p
              - name: Bluray-720p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
                  - HDTV-720p

      sonarr_ru:
        base_url: http://sonarr-ru.media.svc.cluster.local:8989
        api_key: !env_var SONARR_RU_API_KEY
        delete_old_custom_formats: true

        include:
          - template: sonarr-quality-definition-series

        media_naming:
          series: default
          season: default
          episodes:
            rename: true
            standard: default
            daily: default
            anime: default

        custom_formats:
          - trash_ids:
              - 9b27ab6498ec0f31a3353992e19434ca # DV (w/o HDR fallback)
            assign_scores_to:
              - name: WEB-1080p
                score: -10000

          - trash_ids:
              - 85c61753df5da1fb2aab6f2a47426b09 # BR-DISK
              - 9c11cd3f07101cdba90a2d81cf0e56b4 # LQ
              - e2315f990da2e2cbfc9fa5b7a6fcfe48 # LQ (Release Title)
            assign_scores_to:
              - name: WEB-1080p

        quality_profiles:
          - trash_id: 72dae194fc92bf828f32cde7744e51a1 # WEB-1080p
            min_format_score: 0
            quality_sort: top
            upgrade:
              allowed: true
              until_quality: WEB 1080p
              until_score: 10000
            qualities:
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: HDTV-1080p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
              - name: HDTV-720p
            reset_unmatched_scores:
              enabled: true
