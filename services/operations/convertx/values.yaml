controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/c4illin/convertx
          tag: v0.17.0@sha256:e1f85be04bbaf8a55ead9261194c3ae0fa0957d303ea537127154860b2552afd
        env:
          ALLOW_UNAUTHENTICATED: "true"
          UNAUTHENTICATED_USER_SHARING: "false"
          ACCOUNT_REGISTRATION: "false"
          AUTO_DELETE_EVERY_N_HOURS: "24"
          FFMPEG_ARGS: "-hwaccel vaapi -hwaccel_device /dev/dri/renderD128 -hwaccel_output_format vaapi"
        resources:
          limits:
            gpu.intel.com/i915: "1"
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 3000
          readiness:
            enabled: true
            type: TCP
            port: 3000
          startup:
            enabled: true
            type: TCP
            port: 3000
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 3000

persistence:
  config:
    enabled: false
  convertx-data:
    existingClaim: convertx-config
    globalMounts:
      - path: /app/data
