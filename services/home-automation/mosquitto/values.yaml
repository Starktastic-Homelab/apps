controllers:
  main:
    containers:
      main:
        image:
          repository: eclipse-mosquitto
          tag: 2.0.22@sha256:212f89e1eaeb2c322d6441b64396e3346026674db8fa9c27beac293405c32b3c
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 1883
          readiness:
            enabled: true
            type: TCP
            port: 1883
          startup:
            enabled: true
            type: TCP
            port: 1883
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      mqtt:
        port: 1883

persistence:
  config:
    enabled: false
  mosquitto-data:
    existingClaim: mosquitto-config
    globalMounts:
      - path: /mosquitto/data
  mosquitto-conf:
    type: configMap
    name: mosquitto-config
    globalMounts:
      - path: /mosquitto/config/mosquitto.conf
        subPath: mosquitto.conf
  media:
    enabled: false
