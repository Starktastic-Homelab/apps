apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: operations
data:
  favicon.svg: |
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
      <defs>
        <filter id="glow">
          <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
          <feFlood flood-color="#DC2626" flood-opacity="0.5" result="color"/>
          <feComposite in="color" in2="blur" operator="in" result="shadow"/>
          <feMerge>
            <feMergeNode in="shadow"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <rect width="48" height="48" rx="10" fill="#0F0F1A"/>
      <text x="50%" y="34" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
            font-size="26" font-weight="800" letter-spacing="1">
        <tspan fill="#F1F5F9">S</tspan><tspan fill="#DC2626" filter="url(#glow)">T</tspan>
      </text>
    </svg>
  docker.yaml: ""
  custom.js: ""
  custom.css: |
    /* Hide the redundant card title above the calendar widget */
    li.service[data-name="Calendar"] .service-title {
      display: none;
    }
  kubernetes.yaml: |
    mode: disabled
  settings.yaml: |
    title: Starktastic
    headerStyle: boxedWidgets
    statusStyle: dot
    useEqualHeights: true
    hideVersion: true
    hideErrors: true
    disableCollapse: false
    disableIndexing: true
    iconStyle: theme
    favicon: /icons/favicon.svg
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      showSearchSuggestions: false
      provider: custom
      url: https://search.starktastic.net/search?q=
    layout:
      Calendar:
        style: row
        columns: 1
        icon: mdi-calendar-month
        header: false
      Streaming:
        style: row
        columns: 5
        icon: jellyfin.png
      Requests:
        style: row
        columns: 3
        icon: overseerr.png
      Home & Life:
        style: row
        columns: 1
        icon: home-assistant.png
      Productivity:
        style: row
        columns: 3
        icon: vikunja.png
      Security:
        style: row
        columns: 1
        icon: authentik.png
      Utilities:
        style: row
        columns: 4
        icon: mdi-tools
  widgets.yaml: |
    - logo:
        icon: /icons/favicon.svg
    - search:
        provider: custom
        url: https://search.starktastic.net/search?q=
        target: _blank
    - openmeteo:
        label: Weather
        latitude: 32.08
        longitude: 34.78
        timezone: Asia/Jerusalem
        units: metric
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
          hourCycle: h23
  services.yaml: |
    - Calendar:
        - Calendar:
            widget:
              type: calendar
              view: monthly
              maxEvents: 15
              showTime: true
              integrations:
                - type: ical
                  url: http://sonarr.media.svc.cluster.local:8989/feed/v3/calendar/Sonarr.ics?apikey={{ "{{" }}HOMEPAGE_VAR_SONARR_KEY{{ "}}" }}
                  name: Sonarr
                  color: blue
                - type: ical
                  url: http://sonarr-ru.media.svc.cluster.local:8989/feed/v3/calendar/Sonarr.ics?apikey={{ "{{" }}HOMEPAGE_VAR_SONARR_RU_KEY{{ "}}" }}
                  name: Sonarr RU
                  color: sky
                - type: ical
                  url: http://radarr.media.svc.cluster.local:7878/feed/v3/calendar/Radarr.ics?apikey={{ "{{" }}HOMEPAGE_VAR_RADARR_KEY{{ "}}" }}
                  name: Radarr
                  color: red
                - type: ical
                  url: http://radarr-ru.media.svc.cluster.local:7878/feed/v3/calendar/Radarr.ics?apikey={{ "{{" }}HOMEPAGE_VAR_RADARR_RU_KEY{{ "}}" }}
                  name: Radarr RU
                  color: rose
                - type: ical
                  url: http://lidarr.media.svc.cluster.local:8686/feed/v1/calendar/Lidarr.ics?apikey={{ "{{" }}HOMEPAGE_VAR_LIDARR_KEY{{ "}}" }}
                  name: Lidarr
                  color: green
    - Streaming:
        - Jellyfin:
            icon: jellyfin.png
            href: https://benplus.app
            description: Movies, TV & Anime
            widget:
              type: jellyfin
              url: http://jellyfin-main.media.svc.cluster.local:8096
              key: {{ "{{" }}HOMEPAGE_VAR_JELLYFIN_KEY{{ "}}" }}
              enableBlocks: true
              enableNowPlaying: true
              enableUser: true
              showEpisodeNumber: true
        - Immich:
            icon: immich.png
            href: https://photos.benplus.app
            description: Photos & Videos
            widget:
              type: immich
              url: http://immich-main.media.svc.cluster.local:2283
              key: {{ "{{" }}HOMEPAGE_VAR_IMMICH_KEY{{ "}}" }}
              version: 2
        - Navidrome:
            icon: navidrome.png
            href: https://music.benplus.app
            description: Music streaming
            widget:
              type: navidrome
              url: http://navidrome.media.svc.cluster.local:4533
              user: {{ "{{" }}HOMEPAGE_VAR_NAVIDROME_USER{{ "}}" }}
              token: {{ "{{" }}HOMEPAGE_VAR_NAVIDROME_TOKEN{{ "}}" }}
              salt: {{ "{{" }}HOMEPAGE_VAR_NAVIDROME_SALT{{ "}}" }}
        - Audiobookshelf:
            icon: audiobookshelf.png
            href: https://audiobooks.benplus.app
            description: Audiobooks & Podcasts
            widget:
              type: audiobookshelf
              url: http://audiobookshelf.media.svc.cluster.local:80
              key: {{ "{{" }}HOMEPAGE_VAR_AUDIOBOOKSHELF_KEY{{ "}}" }}
        - Calibre-Web:
            icon: calibre-web.png
            href: https://books.benplus.app
            description: E-book library
            widget:
              type: calibreweb
              url: http://calibre-web.media.svc.cluster.local:8083
              username: {{ "{{" }}HOMEPAGE_VAR_CALIBRE_USER{{ "}}" }}
              password: {{ "{{" }}HOMEPAGE_VAR_CALIBRE_PASS{{ "}}" }}
    - Requests:
        - Seerr:
            icon: overseerr.png
            href: https://request.benplus.app
            description: Request movies & TV
            widget:
              type: seerr
              url: http://seerr.media.svc.cluster.local:5055
              key: {{ "{{" }}HOMEPAGE_VAR_SEERR_KEY{{ "}}" }}
        - Seerr RU:
            icon: overseerr.png
            href: https://request-ru.benplus.app
            description: Request movies & TV (RU)
            widget:
              type: seerr
              url: http://seerr-ru.media.svc.cluster.local:5055
              key: {{ "{{" }}HOMEPAGE_VAR_SEERR_RU_KEY{{ "}}" }}
        - Shelfmark:
            icon: mdi-bookshelf
            href: https://request-books.benplus.app
            description: Book requests
    - Home & Life:
        - Mealie:
            icon: mealie.png
            href: https://mealie.starktastic.net
            description: Recipe manager
            widget:
              type: mealie
              url: http://mealie.operations.svc.cluster.local:9000
              key: {{ "{{" }}HOMEPAGE_VAR_MEALIE_KEY{{ "}}" }}
              version: 2
    - Productivity:
        - Vikunja:
            icon: vikunja.png
            href: https://vikunja.starktastic.net
            description: Tasks & to-dos
            widget:
              type: vikunja
              url: http://vikunja.operations.svc.cluster.local:3456
              key: {{ "{{" }}HOMEPAGE_VAR_VIKUNJA_KEY{{ "}}" }}
              enableTaskList: false
              version: 2
        - Karakeep:
            icon: karakeep.png
            href: https://karakeep.starktastic.net
            description: Bookmarks & Read-later
            widget:
              type: karakeep
              url: http://karakeep.operations.svc.cluster.local:3000
              key: {{ "{{" }}HOMEPAGE_VAR_KARAKEEP_KEY{{ "}}" }}
        - Listmonk:
            icon: listmonk.png
            href: https://listmonk.starktastic.net
            description: Newsletter manager
    - Security:
        - Authentik:
            icon: authentik.png
            href: https://auth.starktastic.net
            description: Identity provider
    - Utilities:
        - SearXNG:
            icon: searxng.png
            href: https://search.starktastic.net
            description: Private search engine
        - CyberChef:
            icon: cyberchef.png
            href: https://cyberchef.starktastic.net
            description: Data transformation
        - Stirling PDF:
            icon: stirling-pdf.png
            href: https://pdf.starktastic.net
            description: PDF tools
        - MeTube:
            icon: metube.png
            href: https://metube.benplus.app
            description: Video downloader
        - MicroBin:
            icon: microbin.png
            href: https://microbin.starktastic.net
            description: Paste & share
        - PairDrop:
            icon: pairdrop.png
            href: https://pairdrop.starktastic.net
            description: Local file sharing
        - Excalidash:
            icon: excalidraw.png
            href: https://excalidash.starktastic.net
            description: Collaborative whiteboard
        - ConvertX:
            icon: convertx.png
            href: https://convertx.starktastic.net
            description: File converter
        - ntfy:
            icon: ntfy.png
            href: https://ntfy.starktastic.net
            description: Push notifications
  bookmarks.yaml: |
    - Links:
        - GitHub:
            - abbr: GH
              href: https://github.com/Starktastic-Homelab
