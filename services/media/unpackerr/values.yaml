controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/unpackerr/unpackerr
          tag: 0.15.0
          digest: sha256:9f4cb99b78d8fe2d55f79c490a715e14a8a28d9868373dad642ca5adc2ac3e91
        env:
          UN_INTERVAL: "2m"
          UN_START_DELAY: "1m"
          UN_WEBSERVER_METRICS: "true"
          UN_WEBSERVER_LISTEN_ADDR: "0.0.0.0:5656"

          UN_RADARR_0_URL: "http://radarr.media.svc.cluster.local:7878"
          UN_RADARR_0_PATHS_0: "/data/torrents"
          UN_RADARR_0_PROTOCOLS: "torrent"

          UN_RADARR_1_URL: "http://radarr-ru.media.svc.cluster.local:7878"
          UN_RADARR_1_PATHS_0: "/data/torrents"
          UN_RADARR_1_PROTOCOLS: "torrent"

          UN_SONARR_0_URL: "http://sonarr.media.svc.cluster.local:8989"
          UN_SONARR_0_PATHS_0: "/data/torrents"
          UN_SONARR_0_PROTOCOLS: "torrent"

          UN_SONARR_1_URL: "http://sonarr-ru.media.svc.cluster.local:8989"
          UN_SONARR_1_PATHS_0: "/data/torrents"
          UN_SONARR_1_PROTOCOLS: "torrent"
        envFrom:
          - secretRef:
              name: unpackerr-secret
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 5656
          readiness:
            enabled: true
            type: TCP
            port: 5656
          startup:
            enabled: true
            type: TCP
            port: 5656
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      metrics:
        port: 5656

persistence:
  config:
    enabled: false
  media:
    enabled: true
