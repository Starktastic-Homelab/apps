apiVersion: v1
kind: ConfigMap
metadata:
  name: immich-pg-backup-script
  namespace: media
data:
  backup.sh: |
    #!/bin/sh
    set -e

    BACKUP_DIR=/backup
    RETENTION_DAYS=7
    TIMESTAMP=$(date -u +%Y-%m-%d_%H%M%S)
    DUMP_FILE="${BACKUP_DIR}/immich_${TIMESTAMP}.sql.gz"

    echo "Starting Immich PostgreSQL backup at ${TIMESTAMP}"

    echo "Running pg_dumpall..."
    if pg_dumpall --clean --if-exists | gzip > "${DUMP_FILE}.tmp"; then
      mv "${DUMP_FILE}.tmp" "${DUMP_FILE}"
      SIZE=$(du -h "${DUMP_FILE}" | cut -f1)
      echo "  ✓ Backup saved: ${DUMP_FILE} (${SIZE})"
    else
      echo "  ✗ pg_dumpall failed!"
      rm -f "${DUMP_FILE}.tmp"
      exit 1
    fi

    echo "Cleaning backups older than ${RETENTION_DAYS} days..."
    find "${BACKUP_DIR}" -name "immich_*.sql.gz" -mtime +${RETENTION_DAYS} -print -delete

    echo "Current backups:"
    ls -lh ${BACKUP_DIR}/immich_*.sql.gz 2>/dev/null || echo "  (none)"

    echo "Backup complete at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
