controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/pairdrop
          tag: 1.11.2@sha256:32c219894ac351ebf76674e1d18b5da7a97f52f3ba96acd3a1063bcccdb7b69b
        env:
          WS_FALLBACK: "true"
          RATE_LIMIT: "false"
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 3000
          readiness:
            enabled: true
            type: TCP
            port: 3000
          startup:
            enabled: true
            type: TCP
            port: 3000
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 3000

persistence:
  config:
    enabled: false
