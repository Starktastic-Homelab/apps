controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/pairdrop
          tag: 1.11.2@sha256:cec01dba24690658824cb50d57d4f99489cb6a63abb4dd1f4f3dc0474bc2d9a8
        env:
          WS_FALLBACK: "true"
          RATE_LIMIT: "false"
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 3000
          readiness:
            enabled: true
            type: TCP
            port: 3000
          startup:
            enabled: true
            type: TCP
            port: 3000
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 3000

persistence:
  config:
    enabled: false
