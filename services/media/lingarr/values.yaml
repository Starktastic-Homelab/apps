controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/lingarr-translate/lingarr
          tag: 1.0.9@sha256:26b3dba8ba1d6b37bdde752418bf3f14d3fac16a3c05a64a2c840e8c507d24e5
        env:
          # Translation backend
          SERVICE_TYPE: "libretranslate"
          LIBRE_TRANSLATE_URL: "http://libretranslate.media.svc.cluster.local:5000"

          # Database
          DB_CONNECTION: "sqlite"

          # Sonarr / Radarr (EN instances only)
          SONARR_URL: "http://sonarr.media.svc.cluster.local:8989"
          RADARR_URL: "http://radarr.media.svc.cluster.local:7878"

          # Languages
          SOURCE_LANGUAGES: '[{"name":"English","code":"en"}]'
          TARGET_LANGUAGES: '[{"name":"Hebrew","code":"he"},{"name":"Russian","code":"ru"}]'
        envFrom:
          - secretRef:
              name: lingarr-secret
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /
            port: 8080
          readiness:
            enabled: true
            type: HTTP
            path: /
            port: 8080
          startup:
            enabled: true
            type: HTTP
            path: /
            port: 8080
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8080

persistence:
  config:
    enabled: false
  lingarr-config:
    type: persistentVolumeClaim
    storageClass: "nfs-pv"
    size: 1Gi
    accessMode: ReadWriteMany
    globalMounts:
      - path: /app/config
  media:
    enabled: true
