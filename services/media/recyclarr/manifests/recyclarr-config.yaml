---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
data:
  recyclarr.yml: |
    # yaml-language-server: $schema=https://schemas.recyclarr.dev/v8/config-schema.json

    radarr:
      radarr_main:
        base_url: http://radarr.media.svc.cluster.local:7878
        api_key: !env_var RADARR_API_KEY

        delete_old_custom_formats: true

        media_naming:
          folder: default
          movie:
            rename: true
            standard: standard

        quality_definition:
          type: movie

        quality_profiles:
          - trash_id: 64fb5f9858489bdac2af690e27c8f42f # UHD Bluray + WEB
            reset_unmatched_scores:
              enabled: true
            upgrade:
              allowed: true
              until_quality: Remux-2160p
              until_score: 10000
            qualities:
              - name: Remux-2160p
              - name: Bluray-2160p
              - name: WEB 2160p
                qualities:
                  - WEBDL-2160p
                  - WEBRip-2160p
              - name: Remux-1080p
              - name: Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: Bluray-720p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p

        custom_format_groups:
          add:
            # Release-group tier scoring for Remux / UHD Bluray / HD Bluray /
            # WEB. Not default-synced (natural include is only Base Profile),
            # so explicitly assigned to our profile. The profile's own
            # formatItems already scores UHD Bluray + WEB tiers; this group
            # adds Remux Tier 01/02/03 (+1950/+1900/+1850) so elite remux
            # groups (FraMeSToR, BiZKiT, BMF, ...) outscore generic remuxes.
            # Recyclarr opt-in semantics require explicit `select` for all
            # CFs in this group (none are default-included).
            - trash_id: b2f2af430f73f3ad1f9948f33e0f0cf8 # [Release Groups] HQ
              assign_scores_to:
                - name: UHD Bluray + WEB
              select:
                - 3a3ff47579026e76d6504ebea39390de # Remux Tier 01
                - 9f98181fe5a3fbeb0cc29340da2a468a # Remux Tier 02
                - 8baaf0b3142bf4d94c42a724f034e27a # Remux Tier 03
                - 4d74ac4c4db0b64bff6ce0cffef99bf0 # UHD Bluray Tier 01
                - a58f517a70193f8e578056642178419d # UHD Bluray Tier 02
                - e71939fae578037e7aed3ee219bbe7c1 # UHD Bluray Tier 03
                - ed27ebfef2f323e964fb1f61391bcb35 # HD Bluray Tier 01
                - c20c8647f2746a1f4c4262b0fbbeeeae # HD Bluray Tier 02
                - 5608c71bcebba0a5e666223bae8c9227 # HD Bluray Tier 03
                - c20f169ef63c5f40c2def54abaf4438e # WEB Tier 01
                - 403816d65392c79236dcb6dd591aeda4 # WEB Tier 02
                - af94e0fe497124d1f9ce732069ec8c3b # WEB Tier 03
            # Hard-block DV without HDR fallback
            - trash_id: 7fc2751eef7e6bdc70b74136e5e35c76 # [HDR Formats] DV (w/o HDR fallback)
            # Boost DV and HDR10+
            - trash_id: 1616617ab3a14397a2b2321bcbda44d1 # [HDR Formats] DV Boost
            - trash_id: b29413a7487478fe98228ce79e5689e4 # [HDR Formats] HDR10+ Boost
            # Movie Versions (Hybrid, Remaster, IMAX, etc.)
            # Hybrid and IMAX Enhanced are intentionally omitted here because
            # they have explicit score overrides further below (Hybrid +500,
            # IMAX Enhanced +1000). Selecting them here too would cause
            # Recyclarr "conflicting scores" log noise.
            - trash_id: f4f1474b963b24cf983455743aa9906c # [Optional] Movie Versions
              select:
                - 570bc9ebecd92723d2d21500f4be314c # Remaster
                - eca37840c13c6ef2dd0262b141a5482f # 4K Remaster
                - e0c07d59beb37348e975a930d5e50319 # Criterion Collection
                - 9d27d9d2181838f76dee150882bdc58c # Masters of Cinema
                - 09d9dd29a0fc958f9796e65c2a8864b4 # Open Matte
                - db9b4c4b53d312a3ca5f1378f6440fc9 # Vinegar Syndrome
                - 957d0f44b592285f26449575e8b1167e # Special Edition
                - e9001909a4c88013a359d0b9920d7bea # Theatrical Cut
                - eecf3a857724171f968a66cb5719e152 # IMAX
            # SDR: hard-penalize on this UHD profile
            - trash_id: 47f0d69750de9e16855915fa73bb7b08 # [Optional] SDR
              select:
                - 9c38ebb7384dada637be8899efa68e6f # SDR
                - 25c12f78430a3a23413652cbd1d48d77 # SDR (no WEBDL)
            # Miscellaneous optional formats
            # DV (Disk) intentionally omitted: prefer P8 hybrid remuxes over
            # non-hybrid P7 FEL for the LG C2 + Shield + Wholphin path.
            # x266 blocked (-10000). INTERNAL boosted (+10) as a small quality
            # signal for P2P internal releases. Other CFs in this group (HFR,
            # MULTi, VC-1, VP9, x264, x265) have no default score and would
            # only clutter the Radarr UI.
            - trash_id: 9337080378236ce4c0b183e35790d2a7 # [Optional] Miscellaneous
              select:
                - 390455c22a9cac81a738f6cbad705c3c # x266
                - 182fa1c42a2468f8488e6dcf75a81b81 # INTERNAL
            # Accessibility: hard-block releases tagged with sign-language
            # interpreters or audio-description overlays (WiTH AD/ASL/BSL/BASL).
            # All CFs in this group are opt-in, so we explicitly select them.
            - trash_id: bc3c13e52f2971319bc1748ffa3d1078 # [Optional] Accessibility
              select:
                - 127bdbadcf3e4463a8c707759fbaad75 # WiTH AD
                - 09c60ba54fadb511c6986a7edec4da4b # WiTH ASL
                - 41e4baea7b10ddefc6609d52f742dacd # WiTH BASL
                - e205c5ba6be76b472903f4aec97fdb4b # WiTH BSL
          # Synced by default: Audio Formats, HDR, Streaming Services General,
          # Unwanted Formats (Bad Dual Groups, B&W, No-RlsGroup, Obfuscated,
          # Retags, Scene are auto-synced via Unwanted Formats group).

        custom_formats:
          # Boost Hybrid above default (+100) so P8 hybrid remuxes reliably
          # win over non-hybrid P7 FEL remuxes of equivalent tier.
          - trash_ids:
              - 0f12c086e289cf966fa5948eac571f44 # Hybrid
            assign_scores_to:
              - name: UHD Bluray + WEB
                score: 500

          # Boost IMAX Enhanced above default (+800) so it pulls ahead of
          # standard IMAX when both are available. The LG C2 supports IMAX
          # Enhanced (DTS:X / wider color), so a slight preference is warranted.
          - trash_ids:
              - 9f6cbff8cfe4ebbc1bde14c7b7bec0de # IMAX Enhanced
            assign_scores_to:
              - name: UHD Bluray + WEB
                score: 1000

      radarr_ru:
        base_url: http://radarr-ru.media.svc.cluster.local:7878
        api_key: !env_var RADARR_RU_API_KEY
        delete_old_custom_formats: true

        media_naming:
          folder: default
          movie:
            rename: true
            standard: standard

        quality_definition:
          type: movie

        custom_formats:
          - trash_ids:
              - 923b6abef9b17f937fab56cfcf89e1f1 # DV (w/o HDR fallback)
            assign_scores_to:
              - name: WEB 1080p
                score: -10000

          - trash_ids:
              - ed38b889b31be83fda192888e2286d83 # BR-DISK
              - 90a6f9a284dff5103f6346090e6280c8 # LQ
              - e204b80c87be9497a8a6eaff48f72905 # LQ (Release Title)
            assign_scores_to:
              - name: WEB 1080p

        quality_profiles:
          - name: WEB 1080p
            min_format_score: 0
            quality_sort: top
            upgrade:
              allowed: true
              until_quality: WEB 1080p
              until_score: 10000
            qualities:
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: HDTV-1080p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
              - name: HDTV-720p
            reset_unmatched_scores:
              enabled: true

    sonarr:
      sonarr_main:
        base_url: http://sonarr.media.svc.cluster.local:8989
        api_key: !env_var SONARR_API_KEY

        delete_old_custom_formats: true

        media_naming:
          series: default
          season: default
          episodes:
            rename: true
            standard: default
            daily: default
            anime: default

        quality_definition:
          type: series

        quality_profiles:
          - trash_id: dfa5eaae7894077ad6449169b6eb03e0 # WEB-2160p (Alternative)
            name: WEB-2160p
            reset_unmatched_scores:
              enabled: true
            upgrade:
              allowed: true
              until_quality: Bluray-2160p Remux
              until_score: 10000
            qualities:
              - name: Bluray-2160p Remux
              - name: WEB 2160p
                qualities:
                  - WEBDL-2160p
                  - WEBRip-2160p
              - name: Bluray-1080p Remux
              - name: Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: HDTV-1080p
              - name: Bluray-720p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
              - name: HDTV-720p

          - trash_id: 20e0fc959f1f1704bed501f23bdae76f # [Anime] Remux-1080p
            name: Remux-1080p - Anime
            min_format_score: 100
            reset_unmatched_scores:
              enabled: true
            upgrade:
              allowed: true
              until_quality: Bluray-1080p
              until_score: 10000
            qualities:
              - name: Bluray-1080p
                qualities:
                  - Bluray-1080p Remux
                  - Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
                  - HDTV-1080p
              - name: Bluray-720p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
                  - HDTV-720p

        custom_format_groups:
          # Opt out of [Optional] Language Profiles. It auto-syncs by default
          # for Sonarr and brings in CFs like "German +10000" / "Not English
          # -10000". Profile language is "Original" which already gates the
          # release language at the profile level, but skipping keeps the
          # scoring clean and avoids surprise CFs appearing in Sonarr.
          skip:
            - 74aff4168620ed49dcc67e92b2c2a5b4 # [Optional] Language Profiles
          add:
            # Release-group tier scoring for Remux / HD Bluray / WEB. Not
            # default-synced (natural include is only Base Profile), so
            # explicitly assigned to our profile. The profile template only
            # ships WEB tier scoring in its formatItems; this group adds
            # Remux Tier 01/02 (+1900/+1850) and HD Bluray Tier 01/02
            # (+1800/+1750) so the Bluray-2160p Remux / Bluray-1080p Remux /
            # Bluray-1080p qualities enabled above actually get release-group
            # quality scoring (FraMeSToR-tier groups outscore generic ones).
            # Note: Sonarr's HQ group has no UHD Bluray release-group CFs;
            # TRaSH does not maintain a UHD Bluray release-group tier list
            # for Sonarr (4K TV remuxes are too rare a corpus). Recyclarr
            # opt-in semantics require explicit `select` for all CFs.
            - trash_id: b4a4353e3b3e6789dbef07677ff23686 # [Release Groups] HQ
              assign_scores_to:
                - name: WEB-2160p
              select:
                - 9965a052eb87b0d10313b1cea89eb451 # Remux Tier 01
                - 8a1d0c3d7497e741736761a1da866a2e # Remux Tier 02
                - d6819cba26b1a6508138d25fb5e32293 # HD Bluray Tier 01
                - c2216b7b8aa545dc1ce8388c618f8d57 # HD Bluray Tier 02
                - e6258996055b9fbab7e9cb2f75819294 # WEB Tier 01
                - 58790d4e2fdcd9733aa7ae68ba2bb503 # WEB Tier 02
                - d84935abd3f8556dcd51d4f27e22d0a6 # WEB Tier 03
                - d0c516558625b04b363fa6c5c2c7cfd4 # WEB Scene
            # Hard-block DV without HDR fallback
            - trash_id: d776a1ea912a117d66d83b880ff2055d # [HDR Formats] DV (w/o HDR fallback)
            # Boost DV and HDR10+
            - trash_id: e0b2774083df4265f25c9e5bc6c80940 # [HDR Formats] DV Boost
            - trash_id: 7d366c213e5c23a052b157356fac1921 # [HDR Formats] HDR10+ Boost
            # SDR: hard-penalize on UHD profile
            - trash_id: e1053c0ef622df3749fa43c22865663a # [Optional] SDR
              select:
                - 2016d1676f5ee13a5b7257ff86ac9a93 # SDR
                - 83304f261cf516bb208c18c54c0adf97 # SDR (no WEBDL)
            # Miscellaneous optional formats
            # DV (Disk) intentionally omitted: prefer P8 hybrid remuxes over
            # non-hybrid P7 FEL for the LG C2 + Shield + Wholphin path.
            # x266 blocked (-10000). INTERNAL boosted (+10) as a small quality
            # signal for P2P internal releases. Other CFs in this group (HFR,
            # MULTi, VC-1, VP9, x264, x265, Multi/Single-Episode) have no
            # default score and would only clutter the Sonarr UI.
            - trash_id: f4a0410a1df109a66d6e47dcadcce014 # [Optional] Miscellaneous
              select:
                - 041d90b435ebd773271cea047a457a6a # x266
                - 5ab46ff851b76c337e13e81a4353875f # INTERNAL
            # Accessibility: hard-block releases tagged with sign-language
            # interpreters or audio-description overlays (WiTH AD/ASL/BSL/BASL).
            # All CFs in this group are opt-in, so we explicitly select them.
            - trash_id: bad5bc85573a0134e1e1987c46f67e98 # [Optional] Accessibility
              select:
                - 44ccbcbc74506f208973e1463b11705f # WiTH AD
                - c196536ea8122397c5854040d01f2aa7 # WiTH ASL
                - b40dc2e630723745aab9f1b94f4aab74 # WiTH BASL
                - 0aef382c4ed4c5eb5d40109dfd351b72 # WiTH BSL
            # Season Packs: small bias (+10) toward full-season releases over
            # per-episode batches for cleaner library organization.
            - trash_id: d920fd959d220306888f40b6f38e1578 # [Optional] Season Packs
              assign_scores_to:
                - name: WEB-2160p
            # Series Versions: bias toward remastered TV (e.g. Star Trek TNG,
            # Buffy, X-Files restorations). Hybrid is handled by the explicit
            # override below, so only Remaster is selected here.
            - trash_id: a4a95b9f7bdf10dcb005e765155e4d24 # [Optional] Series Versions
              assign_scores_to:
                - name: WEB-2160p
              select:
                - b735f09d3c025cbb7d75a5d38325b73b # Remaster
            # Audio Formats: NOT auto-synced for Sonarr (unlike Radarr).
            # Applied to both the main UHD profile and the anime profile so
            # both get proper audio scoring without inline duplication.
            - trash_id: e9a1944a254e6f8a9da63083f7ae15cb # [Audio] Audio Formats
              assign_scores_to:
                - name: WEB-2160p
                - name: Remux-1080p - Anime
          # Synced by default: HDR, Streaming Services General, HD/UHD Streaming
          # Boost, Unwanted Formats (Bad Dual Groups, No-RlsGroup, Obfuscated,
          # Retags, Scene are auto-synced via Unwanted Formats group). Language
          # Profiles auto-syncs by default but is explicitly skipped above.

        custom_formats:
          # Boost Hybrid above default (+100) so P8 hybrid remuxes reliably
          # win over non-hybrid P7 FEL remuxes of equivalent tier. The Sonarr
          # Hybrid CF isn't in any group that auto-syncs to WEB-2160p, so
          # this both opts it in and sets the local score.
          - trash_ids:
              - 3a4127d8aa781b44120d907f2cd62627 # Hybrid
            assign_scores_to:
              - name: WEB-2160p
                score: 500

          # Override anime template defaults
          - trash_ids:
              - b2550eb333d27b75833e25b8c2557b38 # 10bit
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 0

          - trash_ids:
              - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 0

          # Unwanted formats for the anime profile
          - trash_ids:
              - 85c61753df5da1fb2aab6f2a47426b09 # BR-DISK
              - 9c11cd3f07101cdba90a2d81cf0e56b4 # LQ
              - e2315f990da2e2cbfc9fa5b7a6fcfe48 # LQ (Release Title)
              - fbcb31d8dabd2a319072b84fc0b7249c # Extras
              - 15a05bc7c1a36e2b57fd628f8977e2fc # AV1
            assign_scores_to:
              - name: Remux-1080p - Anime

      sonarr_ru:
        base_url: http://sonarr-ru.media.svc.cluster.local:8989
        api_key: !env_var SONARR_RU_API_KEY
        delete_old_custom_formats: true

        media_naming:
          series: default
          season: default
          episodes:
            rename: true
            standard: default
            daily: default
            anime: default

        quality_definition:
          type: series

        custom_formats:
          - trash_ids:
              - 9b27ab6498ec0f31a3353992e19434ca # DV (w/o HDR fallback)
            assign_scores_to:
              - name: WEB-1080p
                score: -10000

          - trash_ids:
              - 85c61753df5da1fb2aab6f2a47426b09 # BR-DISK
              - 9c11cd3f07101cdba90a2d81cf0e56b4 # LQ
              - e2315f990da2e2cbfc9fa5b7a6fcfe48 # LQ (Release Title)
            assign_scores_to:
              - name: WEB-1080p

        quality_profiles:
          - trash_id: 72dae194fc92bf828f32cde7744e51a1 # WEB-1080p
            min_format_score: 0
            quality_sort: top
            upgrade:
              allowed: true
              until_quality: WEB 1080p
              until_score: 10000
            qualities:
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: HDTV-1080p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
              - name: HDTV-720p
            reset_unmatched_scores:
              enabled: true
