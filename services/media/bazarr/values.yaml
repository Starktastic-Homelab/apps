controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/bazarr
          tag: 1.5.6@sha256:047222423d6d8556a88581b189175bec57f286f120b52ba29c0390fe6babaa5a
        envFrom:
          - secretRef:
              name: bazarr-secret
        probes:
          liveness:
            port: 6767
          readiness:
            port: 6767
          startup:
            port: 6767
service:
  main:
    ports:
      http:
        port: 6767

persistence:
  scripts:
    type: configMap
    name: bazarr-scripts
    defaultMode: 0755
    globalMounts:
      - path: /scripts
