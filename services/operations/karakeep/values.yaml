controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/karakeep-app/karakeep
          tag: 0.32.0@sha256:64d6a9bbf2d37b5c808cf06b5d87f1f1c7846fdd3844724145a9741aeb06fd31
        resources:
          requests:
            memory: 512Mi
        env:
          DATA_DIR: "/data"
          NEXTAUTH_URL: "https://karakeep.starktastic.net"
          MEILI_ADDR: "http://localhost:7700"
          BROWSER_WEB_URL: "http://localhost:9222"
          DISABLE_PASSWORD_AUTH: "true"
          LOG_LEVEL: "notice"
          # Authentik OIDC
          OAUTH_WELLKNOWN_URL: "https://auth.starktastic.net/application/o/karakeep/.well-known/openid-configuration"
          OAUTH_PROVIDER_NAME: "authentik"
          OAUTH_ALLOW_DANGEROUS_EMAIL_ACCOUNT_LINKING: "true"
        envFrom:
          - secretRef:
              name: karakeep-secret
        probes:
          liveness:
            enabled: true
            type: HTTP
            port: 3000
            path: /
          readiness:
            enabled: true
            type: HTTP
            port: 3000
            path: /
          startup:
            enabled: true
            type: TCP
            port: 3000
            spec:
              failureThreshold: 30
              periodSeconds: 5
      chrome:
        image:
          repository: gcr.io/zenika-hub/alpine-chrome
          tag: "124@sha256:1a0046448e0bb6c275c88f86e01faf0de62b02ec8572901256ada0a8c08be23f"
        args:
          - --no-sandbox
          - --disable-gpu
          - --disable-dev-shm-usage
          - --remote-debugging-address=0.0.0.0
          - --remote-debugging-port=9222
          - --hide-scrollbars
        securityContext:
          capabilities:
            add:
              - SYS_ADMIN
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false
      meilisearch:
        image:
          repository: getmeili/meilisearch
          tag: v1.50.0@sha256:9694a59df43ee3f54b3fda9c5de381a3ee9852678e3e31cadf37d6bddea7fc1b
        command: ["sh", "-c"]
        args:
          - |
            CURRENT=$(meilisearch --version | head -1)
            STORED=$(cat /meili_data/.version_marker 2>/dev/null || echo "none")
            if [ "$CURRENT" != "$STORED" ]; then
              echo "Meilisearch version change: $STORED → $CURRENT"
              echo "Wiping data for clean re-index..."
              find /meili_data -mindepth 1 -not -name '.version_marker' -delete
              echo "$CURRENT" > /meili_data/.version_marker
            else
              echo "Meilisearch version unchanged ($CURRENT), keeping data"
            fi
            exec meilisearch
        env:
          MEILI_NO_ANALYTICS: "true"
          MEILI_ENV: "production"
        envFrom:
          - secretRef:
              name: karakeep-secret
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false

service:
  main:
    controller: main
    ports:
      http:
        port: 3000

persistence:
  config:
    enabled: false
  data:
    existingClaim: karakeep-data
    advancedMounts:
      main:
        main:
          - path: /data
  meilisearch:
    existingClaim: karakeep-meilisearch
    advancedMounts:
      main:
        meilisearch:
          - path: /meili_data
