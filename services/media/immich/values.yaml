controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/immich-app/immich-server
          tag: v1.144.1
          digest: sha256:f34203f6c2db130c26480ff21c412c6f0c37c24ee5261f6a6e4fe1eecaa921c0
        env:
          DB_HOSTNAME: immich-postgres
          DB_PORT: "5432"
          DB_DATABASE_NAME: immich
          DB_USERNAME: immich
          DB_VECTOR_EXTENSION: "pgvecto.rs"
          REDIS_HOSTNAME: redis-master.databases.svc.cluster.local
          REDIS_PORT: "6379"
          IMMICH_MACHINE_LEARNING_URL: "http://immich-machine-learning:3003"
        envFrom:
          - secretRef:
              name: immich-secret
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /api/server/ping
            port: 2283
          readiness:
            enabled: true
            type: HTTP
            path: /api/server/ping
            port: 2283
          startup:
            enabled: true
            type: HTTP
            path: /api/server/ping
            port: 2283
            spec:
              failureThreshold: 30
              periodSeconds: 5

  machine-learning:
    containers:
      main:
        image:
          repository: ghcr.io/immich-app/immich-machine-learning
          tag: v1.144.1
          digest: sha256:21b6a0bf02426336f456e8dca43c55b6a79b8e01ee2c25f91bc817fc3a745e52
        resources:
          limits:
            gpu.intel.com/i915: "1"
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /ping
            port: 3003
          readiness:
            enabled: true
            type: HTTP
            path: /ping
            port: 3003
          startup:
            enabled: true
            type: HTTP
            path: /ping
            port: 3003
            spec:
              failureThreshold: 30
              periodSeconds: 5

  postgres:
    pod:
      securityContext:
        fsGroup: 999
    initContainers:
      rm-postmaster-lock:
        image:
          repository: busybox
          tag: latest
        command:
          - sh
          - -c
          - |
            if [ -f /data/pgdata/postmaster.pid ]; then
              echo "🧟 Zombie Lock Found: Deleting postmaster.pid"
              rm -f /data/pgdata/postmaster.pid
            fi
    containers:
      main:
        image:
          repository: ghcr.io/tensorchord/cloudnative-pgvecto.rs
          tag: 16-v0.4.0
          digest: sha256:d92dedeeb2c1c70110b72270e3f5ba90f222dcc6fb93988d9adb4d0da15a6a9d
        env:
          POSTGRES_DB: immich
          POSTGRES_USER: immich
          POSTGRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-secret
                key: DB_PASSWORD
          POSTGRES_INITDB_ARGS: "--data-checksums"
          PGDATA: "/data/pgdata"
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 5432
          readiness:
            enabled: true
            type: TCP
            port: 5432
          startup:
            enabled: true
            type: TCP
            port: 5432
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 2283
  machine-learning:
    controller: machine-learning
    ports:
      http:
        port: 3003
  postgres:
    controller: postgres
    ports:
      tcp:
        port: 5432

persistence:
  config:
    enabled: false
  library:
    existingClaim: media-library-pvc
    advancedMounts:
      main:
        main:
          - path: /usr/src/app/upload
  pgdata:
    existingClaim: immich-pgdata
    advancedMounts:
      postgres:
        rm-postmaster-lock:
          - path: /data
        main:
          - path: /data
  model-cache:
    existingClaim: immich-model-cache
    advancedMounts:
      machine-learning:
        main:
          - path: /cache
