controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/immich-app/immich-server
          tag: v2.5.6
          digest: sha256:aa163d2e1cc2b16a9515dd1fef901e6f5231befad7024f093d7be1f2da14341a
        env:
          DB_HOSTNAME: immich-postgres
          DB_PORT: "5432"
          DB_DATABASE_NAME: immich
          DB_USERNAME: immich
          DB_VECTOR_EXTENSION: "pgvecto.rs"
          REDIS_HOSTNAME: redis-master.databases.svc.cluster.local
          REDIS_PORT: "6379"
          IMMICH_MACHINE_LEARNING_URL: "http://immich-machine-learning:3003"
        envFrom:
          - secretRef:
              name: immich-secret
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /api/server/ping
            port: 2283
          readiness:
            enabled: true
            type: HTTP
            path: /api/server/ping
            port: 2283
          startup:
            enabled: true
            type: HTTP
            path: /api/server/ping
            port: 2283
            spec:
              failureThreshold: 30
              periodSeconds: 5

  machine-learning:
    containers:
      main:
        image:
          repository: ghcr.io/immich-app/immich-machine-learning
          tag: v2.5.6
          digest: sha256:b213fa3c82d27a21a299c46ffbb38a091f18384db1ad67d409a3b34fe0fce556
        resources:
          limits:
            gpu.intel.com/i915: "1"
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /ping
            port: 3003
          readiness:
            enabled: true
            type: HTTP
            path: /ping
            port: 3003
          startup:
            enabled: true
            type: HTTP
            path: /ping
            port: 3003
            spec:
              failureThreshold: 30
              periodSeconds: 5

  postgres:
    containers:
      main:
        image:
          repository: ghcr.io/tensorchord/cloudnative-pgvecto.rs
          tag: 16-v0.4.0
          digest: sha256:d92dedeeb2c1c70110b72270e3f5ba90f222dcc6fb93988d9adb4d0da15a6a9d
        env:
          POSTGRES_DB: immich
          POSTGRES_USER: immich
          POSTGRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-secret
                key: DB_PASSWORD
          POSTGRES_INITDB_ARGS: "--data-checksums"
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 5432
          readiness:
            enabled: true
            type: TCP
            port: 5432
          startup:
            enabled: true
            type: TCP
            port: 5432
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 2283
  machine-learning:
    controller: machine-learning
    ports:
      http:
        port: 3003
  postgres:
    controller: postgres
    ports:
      tcp:
        port: 5432

persistence:
  config:
    enabled: false
  library:
    existingClaim: media-library-pvc
    advancedMounts:
      main:
        main:
          - path: /usr/src/app/upload
  pgdata:
    existingClaim: immich-pgdata
    advancedMounts:
      postgres:
        main:
          - path: /var/lib/postgresql/data
            subPath: immich
  model-cache:
    existingClaim: immich-model-cache
    advancedMounts:
      machine-learning:
        main:
          - path: /cache
