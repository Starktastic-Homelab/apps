deployment:
  kind: DaemonSet
  # ── Init container: pre-fetch the CrowdSec bouncer plugin so Traefik never
  #    depends on GitHub availability at runtime.  The emptyDir volume persists
  #    across container restarts within the same pod.  On full pod recreation
  #    (reboots, cluster rebuild) the init container re-downloads it before
  #    Traefik starts, so the plugin is always present.
  initContainers:
    - name: download-bouncer-plugin
      image: alpine/git:v2.52.0
      command:
        - sh
        - -c
        - |
          DEST=/plugins-local/src/github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
          # If already populated (container restart), skip.
          [ -f "$DEST/.traefik.yml" ] && echo "plugin already cached" && exit 0
          for i in 1 2 3 4 5; do
            git clone --depth 1 --branch v1.5.1 \
              https://github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin.git \
              "$DEST" && exit 0
            echo "attempt $i failed, retrying in 5s…"
            sleep 5
          done
          echo "FATAL: could not download bouncer plugin" >&2
          exit 1
      volumeMounts:
        - name: crowdsec-bouncer-plugin
          mountPath: /plugins-local/src/github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
  additionalVolumes:
    - name: crowdsec-bouncer-plugin
      emptyDir: {}

logs:
  access:
    enabled: true
    format: json
    fields:
      headers:
        defaultMode: keep

# Allow running on Master/Control Plane nodes
tolerations:
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

ports:
  web:
    port: 8000
    expose:
      default: true
  websecure:
    port: 8443
    expose:
      default: true
    protocol: TCP
  web-int:
    port: 8001
    expose:
      default: false
  websec-int:
    port: 8444
    expose:
      default: false
    protocol: TCP
  metrics:
    port: 9100
    expose:
      default: false
    exposedPort: 9100
service:
  enabled: false
persistence:
  enabled: false
ingressClass:
  enabled: true
  isDefaultClass: true
api:
  dashboard: true
  insecure: true
ingressRoute:
  dashboard:
    enabled: false
providers:
  kubernetesCRD:
    allowCrossNamespace: true
  kubernetesIngress:
    allowExternalNameServices: true
    publishedService:
      enabled: true

# -----------------------------------------------------------------------------
# CrowdSec bouncer plugin  (local mode — no GitHub download at Traefik start)
# The init container above pre-fetches the source into the emptyDir volume so
# the plugin is available before Traefik boots, surviving restarts and rebuilds.
# -----------------------------------------------------------------------------
experimental:
  localPlugins:
    bouncer:
      moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      type: localPath
      mountPath: /plugins-local/src/github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      volumeName: crowdsec-bouncer-plugin

volumes:
  - name: crowdsec-bouncer-key
    mountPath: /etc/crowdsec
    type: secret

# -----------------------------------------------------------------------------
# Distributed tracing (OTLP → Alloy → Tempo)
# -----------------------------------------------------------------------------
tracing:
  otlp:
    enabled: true
    grpc:
      enabled: true
      endpoint: "alloy.monitoring.svc.cluster.local:4317"
      insecure: true

# -----------------------------------------------------------------------------
# Prometheus metrics
# ServiceMonitor is deployed as a separate manifest to avoid the chart's
# hard dependency on monitoring.coreos.com CRDs at template-render time.
# -----------------------------------------------------------------------------
metrics:
  prometheus:
    entryPoint: metrics
    serviceMonitor:
      enabled: false
    service:
      enabled: true
