controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/pairdrop
          tag: 1.11.2@sha256:fc8f3d8431f551fdb6b4bd7014ce722c8f15976ea0150bbba68b4d9326fb8a3c
        env:
          WS_FALLBACK: "true"
          RATE_LIMIT: "false"
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 3000
          readiness:
            enabled: true
            type: TCP
            port: 3000
          startup:
            enabled: true
            type: TCP
            port: 3000
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 3000

persistence:
  config:
    enabled: false
