container_runtime: containerd

# ---------------------------------------------------------------------------
# TLS - mutual TLS for agent ↔ LAPI authentication via cert-manager
# This eliminates the fragile password-based registration init container
# that fails with "user already exist" on agent pod restarts.
# ---------------------------------------------------------------------------
tls:
  enabled: true
  certManager:
    enabled: true
    # Workaround: chart unconditionally renders `secretTemplate:` in agent/bouncer
    # Certificate specs but leaves the body empty when no annotations or labels
    # are set, producing invalid YAML (null value). Providing a harmless annotation
    # ensures the block is non-empty.
    secretTemplate:
      annotations:
        meta.helm.sh/release-name: crowdsec

# ---------------------------------------------------------------------------
# Config - LAPI configuration overrides (merged with default config.yaml)
# ---------------------------------------------------------------------------
config:
  # Override the chart's default config.yaml.local which enables auto_registration
  # (password-based auth). With TLS enabled, password and TLS auth are mutually
  # exclusive so we must explicitly disable auto_registration.
  config.yaml.local: |
    api:
      server:
        auto_registration:
          enabled: false

# ---------------------------------------------------------------------------
# LAPI (Local API) - central decision engine
# ---------------------------------------------------------------------------
lapi:
  env:
    # Pre-register the Traefik bouncer with a known key
    - name: BOUNCER_KEY_traefik
      valueFrom:
        secretKeyRef:
          name: crowdsec-secrets
          key: bouncer-key
    - name: ENROLL_KEY
      valueFrom:
        secretKeyRef:
          name: crowdsec-secrets
          key: enroll-key
    - name: ENROLL_INSTANCE_NAME
      value: "homelab"
    - name: ENROLL_TAGS
      value: "k3s homelab"

  persistentVolume:
    data:
      enabled: true
      accessModes:
        - ReadWriteOnce
      storageClassName: nfs-pv # IMPORTANT: must match global.storageClass in templates/globals.yaml
      size: 1Gi
    config:
      enabled: true
      accessModes:
        - ReadWriteOnce
      storageClassName: nfs-pv # IMPORTANT: must match global.storageClass in templates/globals.yaml
      size: 100Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

# ---------------------------------------------------------------------------
# Agent - reads log sources and sends alerts to LAPI
# ---------------------------------------------------------------------------
agent:
  env:
    - name: COLLECTIONS
      value: >-
        crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/base-http-scenarios

  acquisition:
    - namespace: traefik-system
      podName: traefik-*
      program: traefik
      poll_without_inotify: true

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

  # Allow running on control-plane nodes (Traefik runs there too)
  tolerations:
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
