controllers:
  main:
    pod:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
    initContainers:
      clean-stale-locks:
        image:
          repository: busybox
          tag: stable
        command:
          - sh
          - -c
          - |
            rm -fv /config/qBittorrent/lockfile /config/qBittorrent/ipc-socket
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/qbittorrent
          tag: 5.2.1@sha256:1fc3067c4e684a4139be2e17915a63e9355ccba91c954a330d33fcb033bf7e71
        env:
          WEBUI_PORT: "8080"
          DOCKER_MODS: "ghcr.io/gabe565/linuxserver-mod-vuetorrent"
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8080
          readiness:
            enabled: true
            type: TCP
            port: 8080
          startup:
            enabled: true
            type: TCP
            port: 8080
            spec:
              failureThreshold: 30
              periodSeconds: 5
service:
  main:
    controller: main
    ports:
      http:
        port: 8080
  bittorrent:
    controller: main
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      metallb.universe.tf/loadBalancerIPs: "{{ .Values.global.network.loadBalancers.qbittorrent }}"
    ports:
      bittorrent-tcp:
        enabled: true
        port: 56881
        protocol: TCP
      bittorrent-udp:
        enabled: true
        port: 56881
        protocol: UDP
persistence:
  media:
    enabled: true
  incomplete:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: qbittorrent-incomplete-pvc
    advancedMounts:
      main:
        main:
          - path: /downloads/incomplete
            subPath: qbittorrent
