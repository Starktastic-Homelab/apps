controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/seerr-team/seerr
          tag: v3.2.0@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad
        env:
          LOG_LEVEL: "info"
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /api/v1/status
            port: 5055
          readiness:
            enabled: true
            type: HTTP
            path: /api/v1/status
            port: 5055
          startup:
            enabled: true
            type: HTTP
            path: /api/v1/status
            port: 5055

service:
  main:
    controller: main
    ports:
      http:
        port: 5055

persistence:
  config:
    # storageClass, type, accessMode inherited from common.yaml
    size: 1Gi
    globalMounts:
      - path: /app/config
