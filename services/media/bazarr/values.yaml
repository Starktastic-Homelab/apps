controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/bazarr
          tag: 1.5.6@sha256:4b5e510042bf471c8bafab89cada9774fba2fb25f16ec64235151cacbe847c10
        envFrom:
          - secretRef:
              name: bazarr-secret
        probes:
          liveness:
            port: 6767
          readiness:
            port: 6767
          startup:
            port: 6767
service:
  main:
    ports:
      http:
        port: 6767

persistence:
  scripts:
    type: configMap
    name: bazarr-scripts
    defaultMode: 0755
    globalMounts:
      - path: /scripts
