controllers:
  main:
    containers:
      main:
        image:
          repository: mpepping/cyberchef
          tag: latest@sha256:fdef22c824d556cf6535a35b50b9da5e1130c9d718efce853595e2bc2b264a64
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8000
          readiness:
            enabled: true
            type: TCP
            port: 8000
          startup:
            enabled: true
            type: TCP
            port: 8000
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8000

persistence:
  config:
    enabled: false
  media:
    enabled: false
