controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/lingarr-translate/lingarr
          tag: 1.0.9@sha256:26b3dba8ba1d6b37bdde752418bf3f14d3fac16a3c05a64a2c840e8c507d24e5
        env:
          # Translation backend
          SERVICE_TYPE: "libretranslate"
          LIBRE_TRANSLATE_URL: "http://libretranslate.media.svc.cluster.local:5000"

          # Database
          DB_CONNECTION: "postgres"
          DB_HOST: "postgres-postgresql.databases.svc.cluster.local"
          DB_PORT: "5432"
          DB_DATABASE: "lingarr"
          DB_USERNAME: "lingarr"

          # Sonarr / Radarr (EN instances only)
          SONARR_URL: "http://sonarr.media.svc.cluster.local:8989"
          RADARR_URL: "http://radarr.media.svc.cluster.local:7878"

          # Languages
          SOURCE_LANGUAGES: '[{"name":"English","code":"en"}]'
          TARGET_LANGUAGES: '[{"name":"Hebrew","code":"he"},{"name":"Russian","code":"ru"}]'
        envFrom:
          - secretRef:
              name: lingarr-secret
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /
            port: 8080
          readiness:
            enabled: true
            type: HTTP
            path: /
            port: 8080
          startup:
            enabled: true
            type: HTTP
            path: /
            port: 8080
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8080

# WORKAROUND: Lingarr uses DateTime.Now (Kind=Local) which Npgsql rejects for
# 'timestamp with time zone' columns. This ConfigMap overrides the .NET
# runtimeconfig to enable Npgsql's legacy timestamp behavior.
# Remove once https://github.com/lingarr-translate/lingarr/issues/352 is fixed.
configMaps:
  runtimeconfig:
    data:
      Lingarr.Server.runtimeconfig.json: |
        {
          "runtimeOptions": {
            "tfm": "net9.0",
            "frameworks": [
              { "name": "Microsoft.NETCore.App", "version": "9.0.0" },
              { "name": "Microsoft.AspNetCore.App", "version": "9.0.0" }
            ],
            "configProperties": {
              "System.GC.Server": true,
              "System.Globalization.Invariant": false,
              "System.Reflection.Metadata.MetadataUpdater.IsSupported": false,
              "System.Reflection.NullabilityInfoContext.IsSupported": true,
              "System.Runtime.Serialization.EnableUnsafeBinaryFormatterSerialization": false,
              "Npgsql.EnableLegacyTimestampBehavior": true
            }
          }
        }

persistence:
  config:
    enabled: false
  # WORKAROUND: Mount for runtimeconfig override — remove with the ConfigMap above.
  runtimeconfig:
    type: configMap
    name: lingarr-runtimeconfig
    globalMounts:
      - path: /app/Lingarr.Server.runtimeconfig.json
        subPath: Lingarr.Server.runtimeconfig.json
        readOnly: true
  lingarr-config:
    type: persistentVolumeClaim
    storageClass: "nfs-pv"
    size: 1Gi
    accessMode: ReadWriteMany
    globalMounts:
      - path: /app/config
  media:
    enabled: true
