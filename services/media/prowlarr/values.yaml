controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/prowlarr
          tag: 2.4.0@sha256:3e9bd62ca90c97c5df75b7012e10a29f6926e62807deeddc1dc89e6e2fd141e1
        probes:
          liveness:
            port: 9696
          readiness:
            port: 9696
          startup:
            port: 9696
service:
  main:
    ports:
      http:
        port: 9696

# Prowlarr is an indexer manager and does not need the shared media library
# mounted by the common *arr extras (templates/media-arr-common.yaml).
persistence:
  media:
    enabled: false
