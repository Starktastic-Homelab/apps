controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/bazarr
          tag: 1.5.6@sha256:d736df5df0286373a26d34f47aa413cb8aeada74f6338dac372a6d37ba1b3b0d
        envFrom:
          - secretRef:
              name: bazarr-secret
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /ping
            port: 6767
          readiness:
            enabled: true
            type: HTTP
            path: /ping
            port: 6767
          startup:
            enabled: true
            type: HTTP
            path: /ping
            port: 6767

service:
  main:
    controller: main
    ports:
      http:
        port: 6767

persistence:
  scripts:
    type: configMap
    name: bazarr-scripts
    defaultMode: 0755
    globalMounts:
      - path: /scripts
  media:
    enabled: true
