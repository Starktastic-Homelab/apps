---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
data:
  recyclarr.yml: |
    # yaml-language-server: $schema=https://schemas.recyclarr.dev/v8/config-schema.json

    radarr:
      radarr_main:
        base_url: http://radarr.media.svc.cluster.local:7878
        api_key: !env_var RADARR_API_KEY

        delete_old_custom_formats: true

        media_naming:
          folder: default
          movie:
            rename: true
            standard: standard

        quality_definition:
          type: movie

        quality_profiles:
          - trash_id: 64fb5f9858489bdac2af690e27c8f42f # UHD Bluray + WEB
            reset_unmatched_scores:
              enabled: true
            upgrade:
              until_quality: Remux-2160p
            qualities:
              - name: Remux-2160p
              - name: Bluray-2160p
              - name: WEB 2160p
                qualities:
                  - WEBDL-2160p
                  - WEBRip-2160p
              - name: Remux-1080p
              - name: Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: Bluray-720p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p

        custom_format_groups:
          add:
            # Required: penalizes x265 without HDR/DV
            - trash_id: ff204bbcecdd487d1cefcefdbf0c278d # [Required] Golden Rule UHD
              select:
                - 839bea857ed2c0a8e084f3cbdbd65ecb # x265 (no HDR/DV)
            # Hard-block DV without HDR fallback
            - trash_id: 7fc2751eef7e6bdc70b74136e5e35c76 # [HDR Formats] DV (w/o HDR fallback)
            # Boost DV and HDR10+
            - trash_id: 1616617ab3a14397a2b2321bcbda44d1 # [HDR Formats] DV Boost
            - trash_id: b29413a7487478fe98228ce79e5689e4 # [HDR Formats] HDR10+ Boost
            # Movie Versions (Hybrid, Remaster, IMAX, etc.)
            - trash_id: f4f1474b963b24cf983455743aa9906c # [Optional] Movie Versions
              select:
                - 0f12c086e289cf966fa5948eac571f44 # Hybrid
                - 570bc9ebecd92723d2d21500f4be314c # Remaster
            # SDR: hard-penalize on this UHD profile
            - trash_id: 47f0d69750de9e16855915fa73bb7b08 # [Optional] SDR
              select:
                - 9c38ebb7384dada637be8899efa68e6f # SDR
            # Miscellaneous optional formats
            - trash_id: 9337080378236ce4c0b183e35790d2a7 # [Optional] Miscellaneous
              select:
                - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
                - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
                - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
                - f537cf427b64c38c8e36298f657e4828 # Scene
          # Synced by default: Audio Formats, HDR, Streaming Services General

      radarr_ru:
        base_url: http://radarr-ru.media.svc.cluster.local:7878
        api_key: !env_var RADARR_RU_API_KEY
        delete_old_custom_formats: true

        media_naming:
          folder: default
          movie:
            rename: true
            standard: standard

        quality_definition:
          type: movie

        custom_formats:
          - trash_ids:
              - 923b6abef9b17f937fab56cfcf89e1f1 # DV (w/o HDR fallback)
            assign_scores_to:
              - name: WEB 1080p
                score: -10000

          - trash_ids:
              - ed38b889b31be83fda192888e2286d83 # BR-DISK
              - 90a6f9a284dff5103f6346090e6280c8 # LQ
              - e204b80c87be9497a8a6eaff48f72905 # LQ (Release Title)
            assign_scores_to:
              - name: WEB 1080p

        quality_profiles:
          - name: WEB 1080p
            min_format_score: 0
            quality_sort: top
            upgrade:
              allowed: true
              until_quality: WEB 1080p
              until_score: 10000
            qualities:
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: HDTV-1080p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
              - name: HDTV-720p
            reset_unmatched_scores:
              enabled: true

    sonarr:
      sonarr_main:
        base_url: http://sonarr.media.svc.cluster.local:8989
        api_key: !env_var SONARR_API_KEY

        delete_old_custom_formats: true

        media_naming:
          series: default
          season: default
          episodes:
            rename: true
            standard: default
            daily: default
            anime: default

        quality_definition:
          type: series

        quality_profiles:
          - trash_id: dfa5eaae7894077ad6449169b6eb03e0 # WEB-2160p (Alternative)
            name: WEB-2160p
            reset_unmatched_scores:
              enabled: true
            upgrade:
              until_quality: Bluray-2160p Remux
            qualities:
              - name: Bluray-2160p Remux
              - name: WEB 2160p
                qualities:
                  - WEBDL-2160p
                  - WEBRip-2160p
              - name: Bluray-1080p Remux
              - name: Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: HDTV-1080p
              - name: Bluray-720p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
              - name: HDTV-720p

          - trash_id: 20e0fc959f1f1704bed501f23bdae76f # [Anime] Remux-1080p
            name: Remux-1080p - Anime
            min_format_score: 100
            reset_unmatched_scores:
              enabled: true
            upgrade:
              until_quality: Bluray-1080p
            qualities:
              - name: Bluray-1080p
                qualities:
                  - Bluray-1080p Remux
                  - Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
                  - HDTV-1080p
              - name: Bluray-720p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
                  - HDTV-720p

        custom_format_groups:
          add:
            # Required: penalizes x265 without HDR/DV
            - trash_id: e3f37512790f00d0e89e54fe5e790d1c # [Required] Golden Rule UHD
              select:
                - 9b64dff695c2115facf1b6ea59c9bd07 # x265 (no HDR/DV)
            # Hard-block DV without HDR fallback
            - trash_id: d776a1ea912a117d66d83b880ff2055d # [HDR Formats] DV (w/o HDR fallback)
            # Boost DV and HDR10+
            - trash_id: e0b2774083df4265f25c9e5bc6c80940 # [HDR Formats] DV Boost
            - trash_id: 7d366c213e5c23a052b157356fac1921 # [HDR Formats] HDR10+ Boost
            # SDR: hard-penalize on UHD profile
            - trash_id: e1053c0ef622df3749fa43c22865663a # [Optional] SDR
              select:
                - 2016d1676f5ee13a5b7257ff86ac9a93 # SDR
            # Miscellaneous optional formats
            - trash_id: f4a0410a1df109a66d6e47dcadcce014 # [Optional] Miscellaneous
              select:
                - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
                - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
                - 06d66ab109d4d2eddb2794d21526d140 # Retags
                - 1b3994c551cbb92a2c781af061f4ab44 # Scene
          # Synced by default: Audio Formats, HDR, Streaming Services General

        custom_formats:
          # Override anime template defaults
          - trash_ids:
              - b2550eb333d27b75833e25b8c2557b38 # 10bit
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 0

          - trash_ids:
              - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 0

          # Audio formats for the anime profile (groups only target WEB-2160p)
          - trash_ids:
              - 0d7824bb924701997f874e7ff7d4844a # TrueHD ATMOS
              - 9d00418ba386a083fbf4d58235fc37ef # DTS X
              - b6fbafa7942952a13e17e2b1152b539a # ATMOS (undefined)
              - 4232a509ce60c4e208d13825b7c06264 # DD+ ATMOS
              - 1808e4b9cee74e064dfae3f1db99dbfe # TrueHD
              - c429417a57ea8c41d57e6990a8b0033f # DTS-HD MA
              - 851bd64e04c9374c51102be3dd9ae4cc # FLAC
              - 30f70576671ca933adbdcfc736a69718 # PCM
              - cfa5fbd8f02a86fc55d8d223d06a5e1f # DTS-HD HRA
              - 63487786a8b01b7f20dd2bc90dd4a477 # DD+
              - c1a25cd67b5d2e08287c957b1eb903ec # DTS-ES
              - 5964f2a8b3be407d083498e4459d05d0 # DTS
              - a50b8a0c62274a7c38b09a9619ba9d86 # AAC
              - dbe00161b08a25ac6154c55f95e6318d # DD
            assign_scores_to:
              - name: Remux-1080p - Anime

          # Unwanted formats for the anime profile
          - trash_ids:
              - 85c61753df5da1fb2aab6f2a47426b09 # BR-DISK
              - 9c11cd3f07101cdba90a2d81cf0e56b4 # LQ
              - e2315f990da2e2cbfc9fa5b7a6fcfe48 # LQ (Release Title)
              - fbcb31d8dabd2a319072b84fc0b7249c # Extras
              - 15a05bc7c1a36e2b57fd628f8977e2fc # AV1
            assign_scores_to:
              - name: Remux-1080p - Anime

      sonarr_ru:
        base_url: http://sonarr-ru.media.svc.cluster.local:8989
        api_key: !env_var SONARR_RU_API_KEY
        delete_old_custom_formats: true

        media_naming:
          series: default
          season: default
          episodes:
            rename: true
            standard: default
            daily: default
            anime: default

        quality_definition:
          type: series

        custom_formats:
          - trash_ids:
              - 9b27ab6498ec0f31a3353992e19434ca # DV (w/o HDR fallback)
            assign_scores_to:
              - name: WEB-1080p
                score: -10000

          - trash_ids:
              - 85c61753df5da1fb2aab6f2a47426b09 # BR-DISK
              - 9c11cd3f07101cdba90a2d81cf0e56b4 # LQ
              - e2315f990da2e2cbfc9fa5b7a6fcfe48 # LQ (Release Title)
            assign_scores_to:
              - name: WEB-1080p

        quality_profiles:
          - trash_id: 72dae194fc92bf828f32cde7744e51a1 # WEB-1080p
            min_format_score: 0
            quality_sort: top
            upgrade:
              allowed: true
              until_quality: WEB 1080p
              until_score: 10000
            qualities:
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
              - name: HDTV-1080p
              - name: WEB 720p
                qualities:
                  - WEBDL-720p
                  - WEBRip-720p
              - name: HDTV-720p
            reset_unmatched_scores:
              enabled: true
