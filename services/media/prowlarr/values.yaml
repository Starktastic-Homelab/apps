controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/prowlarr
          tag: 2.4.0@sha256:7ab5769616c1929247c8e7944453253f0b777fac2724c3bc9976ae2ff4023257
        probes:
          liveness:
            port: 9696
          readiness:
            port: 9696
          startup:
            port: 9696
service:
  main:
    ports:
      http:
        port: 9696

# Prowlarr is an indexer manager and does not need the shared media library
# mounted by the common *arr extras (templates/media-arr-common.yaml).
persistence:
  media:
    enabled: false
