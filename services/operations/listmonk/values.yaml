controllers:
  main:
    containers:
      main:
        image:
          repository: listmonk/listmonk
          tag: v6.1.0@sha256:179d00d9553c371b6fe88c9b145095d651e275bdd66db46b2e0b79daff316b6f
        command:
          [
            sh,
            -c,
            "./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk
            --config ''"
          ]
        envFrom:
          - secretRef:
              name: listmonk-secret
        probes:
          liveness:
            enabled: true
            type: HTTP
            port: 9000
            path: /health
          readiness:
            enabled: true
            type: HTTP
            port: 9000
            path: /health
          startup:
            enabled: true
            type: TCP
            port: 9000
            spec:
              failureThreshold: 30
              periodSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

service:
  main:
    controller: main
    ports:
      http:
        port: 9000

persistence:
  uploads:
    existingClaim: listmonk-uploads
    globalMounts:
      - path: /listmonk/uploads
