controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/dani-garcia/vaultwarden
          tag: 1.35.5@sha256:b0be02bdc08fde3ce253d01be2b5bf9ba0add2ae6f029fbacc096fd65af0a2b8
        env:
          DOMAIN: "https://vaultwarden.internal.starktastic.net"
          ROCKET_PORT: "8080"
          SIGNUPS_ALLOWED: "false"
          INVITATIONS_ALLOWED: "true"
          SHOW_PASSWORD_HINT: "false"
          # SSO / OpenID Connect (https://integrations.goauthentik.io/security/vaultwarden/)
          SSO_ENABLED: "true"
          SSO_ONLY: "false"
          SSO_AUTHORITY: "https://auth.starktastic.net/application/o/vaultwarden/"
          SSO_SCOPES: "email profile offline_access"
          SSO_ALLOW_UNKNOWN_EMAIL_VERIFICATION: "false"
          SSO_CLIENT_CACHE_EXPIRATION: "0"
          SSO_SIGNUPS_MATCH_EMAIL: "true"
        envFrom:
          - secretRef:
              name: vaultwarden-secret
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /alive
            port: 8080
          readiness:
            enabled: true
            type: HTTP
            path: /alive
            port: 8080
          startup:
            enabled: true
            type: TCP
            port: 8080
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8080

persistence:
  config:
    enabled: false
  data:
    existingClaim: vaultwarden-data
    globalMounts:
      - path: /data
