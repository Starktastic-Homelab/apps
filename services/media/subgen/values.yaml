controllers:
  main:
    containers:
      main:
        image:
          repository: mccloud/subgen
          tag: 2026.03.6-cpu@sha256:c27bd54824a2d96063e77d207c0a4692ee461e31bbb78182865aa739db1ef021
        env:
          WHISPER_MODEL: "small"
          TRANSCRIBE_DEVICE: "cpu"
          WHISPER_THREADS: "4"
          CONCURRENT_TRANSCRIPTIONS: "1"
          CLEAR_VRAM_ON_COMPLETE: "True"
          MODEL_CLEANUP_DELAY: "30"
          UPDATE: "False"
          DEBUG: "False"
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /status
            port: 9000
          readiness:
            enabled: true
            type: HTTP
            path: /status
            port: 9000
          startup:
            enabled: true
            type: HTTP
            path: /status
            port: 9000
            spec:
              initialDelaySeconds: 10
              failureThreshold: 60
              periodSeconds: 10

service:
  main:
    controller: main
    ports:
      http:
        port: 9000

persistence:
  config:
    enabled: false
  models:
    type: emptyDir
    globalMounts:
      - path: /subgen/models
