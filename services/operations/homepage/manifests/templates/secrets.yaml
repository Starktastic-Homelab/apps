# NOTE: This is a PLACEHOLDER. Each encryptedData value must be sealed using
# scripts/seal.sh before deployment. The keys below show the required
# HOMEPAGE_VAR_* environment variables that Homepage needs.
#
# To seal a value:
#   ./scripts/seal.sh homepage-secrets operations HOMEPAGE_VAR_JELLYFIN_KEY "<api-key>"
#
# Required API keys to collect:
#   - Jellyfin: Settings → API Keys
#   - Radarr/Radarr-RU: Settings → General → API Key
#   - Sonarr/Sonarr-RU: Settings → General → API Key
#   - Prowlarr: Settings → General → API Key
#   - Bazarr: Settings → General → API Key
#   - Lidarr: Settings → General → API Key
#   - Immich: Account Settings → API Keys
#   - Authentik: Admin → Directory → Tokens (API token for user)
#   - Grafana: admin username/password
#   - Paperless-ngx: Settings → API Token
#   - Mealie: User → API Tokens
#   - Changedetection: Settings → API Key
#   - Autobrr: Settings → API Key
#   - Audiobookshelf: Settings → API Token
#   - Karakeep: Settings → API Keys
#   - Seerr/Seerr-RU: Settings → General → API Key
#   - Navidrome: Create subsonic token (user, token, salt)
#   - Calibre-Web: username/password
#   - ArgoCD: Settings → Accounts → API token
#   - Proxmox: Datacenter → Permissions → API Tokens (PVEAuditor role)
#   - Home Assistant: Profile → Long-Lived Access Tokens
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: homepage-secrets
  namespace: operations
spec:
  encryptedData:
    HOMEPAGE_VAR_JELLYFIN_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_IMMICH_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_NAVIDROME_USER: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_NAVIDROME_TOKEN: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_NAVIDROME_SALT: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_SEERR_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_SEERR_RU_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_HASS_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_MEALIE_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_AUDIOBOOKSHELF_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_RADARR_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_RADARR_RU_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_SONARR_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_SONARR_RU_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_LIDARR_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_CALIBRE_USER: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_CALIBRE_PASS: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_BAZARR_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_PROWLARR_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_AUTOBRR_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_GRAFANA_USER: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_GRAFANA_PASS: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_AUTHENTIK_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_ARGOCD_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_PAPERLESS_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_KARAKEEP_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_CHANGEDETECTION_KEY: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_PROXMOX_USER: PLACEHOLDER_SEAL_ME
    HOMEPAGE_VAR_PROXMOX_PASS: PLACEHOLDER_SEAL_ME
  template:
    metadata:
      name: homepage-secrets
      namespace: operations
