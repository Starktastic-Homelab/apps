controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/calibrain/shelfmark
          tag: v1.2.1@sha256:70b312dd4748a3b6dc5b1ce0d7ecfeb222292be60676912993d0721220936b33
        env:
          FLASK_PORT: "8084"
          INGEST_DIR: "/books"
          HIDE_LOCAL_AUTH: "true"
          OIDC_AUTO_REDIRECT: "true"
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /api/health
            port: 8084
          readiness:
            enabled: true
            type: HTTP
            path: /api/health
            port: 8084
          startup:
            enabled: true
            type: HTTP
            path: /api/health
            port: 8084

service:
  main:
    controller: main
    ports:
      http:
        port: 8084

persistence:
  ingest:
    existingClaim: cwa-book-ingest
    globalMounts:
      - path: /books
  media:
    enabled: true
