controllers:
  main:
    containers:
      main:
        image:
          repository: mpepping/cyberchef
          tag: latest
          digest: sha256:e7aef5df192ce3454c2964cf585a77caf2eced0ebab6712263677ae667b5ce63
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8000
          readiness:
            enabled: true
            type: TCP
            port: 8000
          startup:
            enabled: true
            type: TCP
            port: 8000
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8000

persistence:
  config:
    enabled: false
  media:
    enabled: false
