controllers:
  main:
    containers:
      main:
        image:
          repository: mpepping/cyberchef
          tag: latest@sha256:e738426acf6a315fc572ed6df9fc4a61e52950c06e1e9c2aeac3202a85ef3d9c
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8000
          readiness:
            enabled: true
            type: TCP
            port: 8000
          startup:
            enabled: true
            type: TCP
            port: 8000
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8000

persistence:
  config:
    enabled: false
  media:
    enabled: false
