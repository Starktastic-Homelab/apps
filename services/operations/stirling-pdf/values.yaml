controllers:
  main:
    containers:
      main:
        image:
          repository: stirlingtools/stirling-pdf
          tag: latest@sha256:3fcfa4d6b6ff22fdbf96ff2aae98dc2fb6d8c1ba0afab1dd2fdfdcdc9ab543c4
        env:
          SECURITY_ENABLELOGIN: "false"
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8080
          readiness:
            enabled: true
            type: TCP
            port: 8080
          startup:
            enabled: true
            type: TCP
            port: 8080
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8080

persistence:
  config:
    enabled: false
  stirling-pdf-config:
    existingClaim: stirling-pdf-config
    globalMounts:
      - path: /configs
  media:
    enabled: false
