controllers:
  main:
    initContainers:
      clean-stale-locks:
        image:
          repository: busybox
          tag: stable
        command:
          - sh
          - -c
          - |
            rm -fv /config/qBittorrent/lockfile /config/qBittorrent/ipc-socket
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/qbittorrent
          tag: 5.2.0@sha256:eeea9f8a8cdde23555186843d26e8ded1222421f31f98a5cc1b50c2882ebcf4e
        env:
          WEBUI_PORT: "8080"
          DOCKER_MODS: "ghcr.io/gabe565/linuxserver-mod-vuetorrent"
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8080
          readiness:
            enabled: true
            type: TCP
            port: 8080
          startup:
            enabled: true
            type: TCP
            port: 8080
            spec:
              failureThreshold: 30
              periodSeconds: 5
service:
  main:
    controller: main
    ports:
      http:
        port: 8080
  bittorrent:
    controller: main
    type: LoadBalancer
    externalTrafficPolicy: Local
    annotations:
      metallb.universe.tf/loadBalancerIPs: "{{ .Values.global.network.loadBalancers.qbittorrent }}"
    ports:
      bittorrent-tcp:
        enabled: true
        port: 56881
        protocol: TCP
      bittorrent-udp:
        enabled: true
        port: 56881
        protocol: UDP
persistence:
  media:
    enabled: true
