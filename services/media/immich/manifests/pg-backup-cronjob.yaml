apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-pg-backup
  namespace: media
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-backup
              image: postgres:alpine
              command: ["/bin/sh", "/scripts/backup.sh"]
              env:
                - name: PGHOST
                  value: immich-postgres.media.svc.cluster.local
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  value: immich
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: immich-secret
                      key: DB_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
                - name: script
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: immich-pg-backup
            - name: script
              configMap:
                name: immich-pg-backup-script
                defaultMode: 0755
