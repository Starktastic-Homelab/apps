controllers:
  main:
    containers:
      main:
        image:
          repository: mccloud/subgen
          tag: 2026.03.8-cpu@sha256:31046d8d1444218bf2339dcf3b711455e52dfff7e14a9596e69dcff826b4c79f
        env:
          WHISPER_MODEL: "small"
          TRANSCRIBE_DEVICE: "cpu"
          WHISPER_THREADS: "4"
          CONCURRENT_TRANSCRIPTIONS: "1"
          CLEAR_VRAM_ON_COMPLETE: "True"
          MODEL_CLEANUP_DELAY: "30"
          UPDATE: "False"
          DEBUG: "False"
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /status
            port: 9000
          readiness:
            enabled: true
            type: HTTP
            path: /status
            port: 9000
          startup:
            enabled: true
            type: HTTP
            path: /status
            port: 9000
            spec:
              initialDelaySeconds: 10
              failureThreshold: 60
              periodSeconds: 10

service:
  main:
    controller: main
    ports:
      http:
        port: 9000

persistence:
  config:
    enabled: false
  media:
    enabled: true
  models:
    type: emptyDir
    globalMounts:
      - path: /subgen/models
