controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/calibrain/shelfmark
          tag: v1.2.3@sha256:28a0ecce3fec938419605c08846524e30e3709ad4be8f58a635c084dde39b8fa
        env:
          FLASK_PORT: "8084"
          INGEST_DIR: "/books"
          HIDE_LOCAL_AUTH: "true"
          OIDC_AUTO_REDIRECT: "true"
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /api/health
            port: 8084
          readiness:
            enabled: true
            type: HTTP
            path: /api/health
            port: 8084
          startup:
            enabled: true
            type: HTTP
            path: /api/health
            port: 8084

service:
  main:
    controller: main
    ports:
      http:
        port: 8084

persistence:
  ingest:
    existingClaim: cwa-book-ingest
    globalMounts:
      - path: /books
  media:
    enabled: true
