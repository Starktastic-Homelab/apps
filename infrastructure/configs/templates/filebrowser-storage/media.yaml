apiVersion: v1
kind: PersistentVolume
metadata:
  name: filebrowser-media-pv
  annotations:
    argocd.argoproj.io/sync-options: Delete=false
spec:
  capacity:
    storage: 10Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: {{ .Values.global.network.nfs.server }}
    path: /mnt/main/media
  mountOptions:
    - nfsvers=4.1
    - noatime
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: filebrowser-media-pvc
  namespace: operations
  annotations:
    argocd.argoproj.io/sync-options: Delete=false
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: filebrowser-media-pv
  resources:
    requests:
      storage: 10Ti
