controllers:
  main:
    containers:
      main:
        image:
          repository: sdblepas/cineplete
          tag: v4.4.0@sha256:6fbb448eba57f566eb4c25de6ff9a442d7b61e16c9108ca16d8effbba558b1f8
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8787
          readiness:
            enabled: true
            type: TCP
            port: 8787
          startup:
            enabled: true
            type: TCP
            port: 8787
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8787

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: "nfs-pv"
    size: 1Gi
    accessMode: ReadWriteMany
    globalMounts:
      - path: /data
