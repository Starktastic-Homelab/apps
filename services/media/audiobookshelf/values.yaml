controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/advplyr/audiobookshelf
          tag: 2.35.0@sha256:89276ff2e0b3d2f07dd334b641f27a34ab7f02e1047c60b7b8a30126cb0813a5
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /healthcheck
            port: 80
          readiness:
            enabled: true
            type: HTTP
            path: /healthcheck
            port: 80
          startup:
            enabled: true
            type: HTTP
            path: /healthcheck
            port: 80

service:
  main:
    controller: main
    ports:
      http:
        port: 80

persistence:
  config:
    size: 2Gi
  media:
    enabled: true
