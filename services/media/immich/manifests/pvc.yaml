apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-pgdata
  namespace: media
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: "iscsi-pv"
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-model-cache
  namespace: media
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: "iscsi-pv"
  resources:
    requests:
      storage: 5Gi
