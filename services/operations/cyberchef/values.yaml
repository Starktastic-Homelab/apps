controllers:
  main:
    containers:
      main:
        image:
          repository: mpepping/cyberchef
          tag: latest
          digest: sha256:6029c8a3420514a1d3cde89abcdc2f1c434c217aa74f6eb0b5b08f72d8ba1904
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8000
          readiness:
            enabled: true
            type: TCP
            port: 8000
          startup:
            enabled: true
            type: TCP
            port: 8000
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8000

persistence:
  config:
    enabled: false
  media:
    enabled: false
