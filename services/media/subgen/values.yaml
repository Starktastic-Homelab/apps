controllers:
  main:
    pod:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
    containers:
      main:
        image:
          repository: mccloud/subgen
          tag: 2026.04.3-cpu@sha256:153984207dd5c4856c25c79f2c7bf26393340b67b9c091a0b640367106c796cc
        env:
          WHISPER_MODEL: "small"
          TRANSCRIBE_DEVICE: "cpu"
          TRANSCRIBE_OR_TRANSLATE: "translate"
          WHISPER_THREADS: "6"
          CONCURRENT_TRANSCRIPTIONS: "1"
          CLEAR_VRAM_ON_COMPLETE: "True"
          MODEL_CLEANUP_DELAY: "30"
          UPDATE: "False"
          DEBUG: "False"
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /status
            port: 9000
          readiness:
            enabled: true
            type: HTTP
            path: /status
            port: 9000
          startup:
            enabled: true
            type: HTTP
            path: /status
            port: 9000
            spec:
              initialDelaySeconds: 10
              failureThreshold: 60
              periodSeconds: 10

service:
  main:
    controller: main
    ports:
      http:
        port: 9000

persistence:
  config:
    enabled: false
  media:
    enabled: true
  models:
    type: emptyDir
    globalMounts:
      - path: /subgen/models
