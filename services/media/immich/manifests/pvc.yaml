apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-pgdata
  namespace: media
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: "nfs-pv"
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-model-cache
  namespace: media
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: "nfs-pv"
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-pg-backup
  namespace: media
spec:
  accessModes: ["ReadWriteMany"]
  storageClassName: "nfs-pv"
  resources:
    requests:
      storage: 1Gi
