controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/advplyr/audiobookshelf
          tag: 2.33.0
          digest: sha256:41047b9985f9c38c92ae8b4b34ffd1d77fca36efdfe49c6b962ff2fc8ccae1e9
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /healthcheck
            port: 80
          readiness:
            enabled: true
            type: HTTP
            path: /healthcheck
            port: 80
          startup:
            enabled: true
            type: HTTP
            path: /healthcheck
            port: 80

service:
  main:
    controller: main
    ports:
      http:
        port: 80

persistence:
  config:
    size: 2Gi
  media:
    enabled: true
