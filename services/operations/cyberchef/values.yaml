controllers:
  main:
    containers:
      main:
        image:
          repository: mpepping/cyberchef
          tag: latest
          digest: sha256:cfa8b4485cc0ecdfd3718fb9c3a5a85e50f8c86aaa90be44217194b27c189b05
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8000
          readiness:
            enabled: true
            type: TCP
            port: 8000
          startup:
            enabled: true
            type: TCP
            port: 8000
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8000

persistence:
  config:
    enabled: false
  media:
    enabled: false
