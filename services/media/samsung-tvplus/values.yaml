controllers:
  main:
    containers:
      main:
        image:
          repository: docker.io/matthuisman/samsung-tvplus-for-channels
          tag: latest@sha256:1693a960e581e059e9f3baaa89d7962cf1c8928a45fcc477861521e60023f4b5
        env:
          TZ: Asia/Jerusalem
          PORT: "8080"
          REGIONS: us
          GROUPS: "Sports & Outdoors|Motor Sports"
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8080
          readiness:
            enabled: true
            type: TCP
            port: 8080
          startup:
            enabled: true
            type: TCP
            port: 8080
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8080

persistence:
  config:
    enabled: false
