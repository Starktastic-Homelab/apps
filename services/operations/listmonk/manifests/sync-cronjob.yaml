apiVersion: batch/v1
kind: CronJob
metadata:
  name: listmonk-sync
  namespace: operations
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 3
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: ghcr.io/jqlang/jq:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e

                  AUTHENTIK_URL="http://authentik-server.authentik.svc.cluster.local"
                  LISTMONK_URL="http://listmonk.operations.svc.cluster.local:9000"
                  LIST_ID=3
                  EXCLUDE_EMAILS="root@example.com,benfaingold@gmail.com"

                  echo "Fetching users from Authentik..."
                  PAGE=1
                  while true; do
                    RESPONSE=$(wget -qO- \
                      --header="Authorization: Bearer ${AUTHENTIK_API_TOKEN}" \
                      "${AUTHENTIK_URL}/api/v3/core/users/?is_active=true&page=${PAGE}&page_size=100")

                    echo "$RESPONSE" | jq -r '.results[] | "\(.email)\t\(.name)"' | while IFS="$(printf '\t')" read -r EMAIL NAME; do
                      [ -z "$EMAIL" ] && continue

                      echo "${EXCLUDE_EMAILS}" | tr ',' '\n' | grep -qxF "$EMAIL" && {
                        echo "Skipping excluded: ${EMAIL}"
                        continue
                      }

                      [ -z "$NAME" ] && NAME="$EMAIL"

                      echo "Syncing: ${NAME} <${EMAIL}>"

                      BODY=$(printf '{"email":"%s","name":"%s","status":"enabled","lists":[%d],"preconfirm_subscriptions":true}' "$EMAIL" "$NAME" "$LIST_ID")

                      STATUS=$(wget -qO/dev/null -S \
                        --header="Authorization: Basic $(printf '%s:%s' "${LISTMONK_API_USER}" "${LISTMONK_API_PASSWORD}" | base64)" \
                        --header="Content-Type: application/json" \
                        --post-data="$BODY" \
                        "${LISTMONK_URL}/api/subscribers" 2>&1 | grep "HTTP/" | tail -1 | awk '{print $2}')

                      case "$STATUS" in
                        200) echo "  -> Created" ;;
                        409) echo "  -> Already exists (skipped)" ;;
                        *)   echo "  -> Unexpected status: ${STATUS}" ;;
                      esac
                    done

                    HAS_NEXT=$(echo "$RESPONSE" | jq -r '.next // empty')
                    [ -z "$HAS_NEXT" ] && break
                    PAGE=$((PAGE + 1))
                  done

                  echo "Sync complete."
              envFrom:
                - secretRef:
                    name: listmonk-sync-secret
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
