controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/bazarr
          tag: 1.5.6@sha256:4b7bb6d861c08bbf0c388b936ada8b2ba57669ca9974323f504e974577d19d63
        envFrom:
          - secretRef:
              name: bazarr-secret
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /ping
            port: 6767
          readiness:
            enabled: true
            type: HTTP
            path: /ping
            port: 6767
          startup:
            enabled: true
            type: HTTP
            path: /ping
            port: 6767

service:
  main:
    controller: main
    ports:
      http:
        port: 6767

persistence:
  scripts:
    type: configMap
    name: bazarr-scripts
    defaultMode: 0755
    globalMounts:
      - path: /scripts
  media:
    enabled: true
