controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/jordan-dalby/bytestash
          tag: 1.5.12@sha256:eb4f736b8cd45443be0ed6d8da3ee49b76dbf27f4d3925b81b3c407207e62531
        env:
          # Auth
          ALLOW_NEW_ACCOUNTS: "false"
          DISABLE_INTERNAL_ACCOUNTS: "true"
          # OIDC
          OIDC_ENABLED: "true"
          OIDC_DISPLAY_NAME: "Authentik"
          OIDC_ISSUER_URL: "https://auth.starktastic.net/application/o/bytestash/"
          # Session
          TOKEN_EXPIRY: "24h"
        envFrom:
          - secretRef:
              name: bytestash-secret
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 5000
          readiness:
            enabled: true
            type: TCP
            port: 5000
          startup:
            enabled: true
            type: TCP
            port: 5000
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 5000

persistence:
  data:
    existingClaim: bytestash-data
    globalMounts:
      - path: /data/snippets
