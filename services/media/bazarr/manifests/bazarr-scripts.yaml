---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bazarr-scripts
  namespace: media
data:
  postprocess.py: |
    #!/usr/bin/env python3
    """Bazarr post-processing script.

    Called by Bazarr with template-substituted arguments:
      python3 /scripts/postprocess.py <directory> <subtitles> <lang_code2> <series_id> <episode_id>

    1. Refreshes only the affected directory in Jellyfin (not the whole library).
    2. If the downloaded subtitle is English, queries Lingarr for configured
       target languages and triggers translation to each one via Bazarr,
       skipping languages that Bazarr already knows about (via API) or that
       already have a subtitle file on disk.
    3. Refreshes Jellyfin again after translations complete.
    """

    import glob
    import json
    import os
    import sys
    import urllib.parse
    import urllib.request

    JELLYFIN_URL = "http://jellyfin-main.media.svc.cluster.local:8096"
    JELLYFIN_TOKEN = os.environ.get("JELLYFIN_API_KEY", "")
    BAZARR_URL = "http://localhost:6767"
    BAZARR_APIKEY = os.environ.get("BAZARR_APIKEY", "")
    LINGARR_URL = "http://lingarr.media.svc.cluster.local:8080"


    def get_translate_targets():
        """Fetch configured target languages from Lingarr."""
        req = urllib.request.Request(f"{LINGARR_URL}/api/setting/target_languages")
        try:
            resp = urllib.request.urlopen(req, timeout=10)
            languages = json.loads(resp.read().decode())
            codes = [lang["code"] for lang in languages]
            print(f"Lingarr targets: {codes}")
            return codes
        except Exception as e:
            print(f"Failed to fetch Lingarr targets: {e}", file=sys.stderr)
            return []


    def subtitle_exists(subtitle_path, target_lang):
        """Check if a subtitle for the target language already exists on disk."""
        # e.g. /media/tv/Show/S01/Show - S01E01.en.srt -> /media/tv/Show/S01/Show - S01E01
        base = subtitle_path.rsplit(".", 1)[0]  # strip extension (.srt/.ass)
        parts = base.split(".")
        while parts and parts[-1] in ("hi", "forced", "sdh", "cc"):
            parts.pop()
        if parts:
            parts.pop()  # remove source language code (en/eng)
        video_base = ".".join(parts)
        matches = glob.glob(f"{glob.escape(video_base)}.{target_lang}.*")
        return len(matches) > 0


    def jellyfin_refresh(directory):
        """Notify Jellyfin that a specific directory was modified."""
        data = json.dumps(
            {"Updates": [{"Path": directory, "UpdateType": "Modified"}]}
        ).encode()
        req = urllib.request.Request(
            f"{JELLYFIN_URL}/Library/Media/Updated",
            data=data,
            headers={
                "X-Emby-Token": JELLYFIN_TOKEN,
                "Content-Type": "application/json",
            },
            method="POST",
        )
        try:
            urllib.request.urlopen(req, timeout=15)
            print(f"Jellyfin: refreshed {directory}")
        except Exception as e:
            print(f"Jellyfin refresh failed: {e}", file=sys.stderr)


    def get_known_subtitle_languages(media_type, series_id, episode_id):
        """Query Bazarr API for languages it already knows about.

        Returns a set of 2-letter language codes for subtitles Bazarr has
        registered (including embedded streams not yet extracted to disk).
        Returns an empty set on failure so the caller falls back to disk checks.
        """
        try:
            if media_type == "episode":
                qs = urllib.parse.urlencode(
                    {"seriesid[]": series_id, "apikey": BAZARR_APIKEY}
                )
                url = f"{BAZARR_URL}/api/episodes?{qs}"
                resp = urllib.request.urlopen(
                    urllib.request.Request(url), timeout=10
                )
                data = json.loads(resp.read().decode())
                episodes = data.get("data", data) if isinstance(data, dict) else data
                for ep in episodes:
                    if str(ep.get("sonarrEpisodeId")) == str(episode_id):
                        return {
                            sub.get("code2", sub.get("code", ""))
                            for sub in ep.get("subtitles", [])
                        } - {""}
            else:
                qs = urllib.parse.urlencode(
                    {"radarrid[]": episode_id, "apikey": BAZARR_APIKEY}
                )
                url = f"{BAZARR_URL}/api/movies?{qs}"
                resp = urllib.request.urlopen(
                    urllib.request.Request(url), timeout=10
                )
                data = json.loads(resp.read().decode())
                movies = data.get("data", data) if isinstance(data, dict) else data
                if movies:
                    return {
                        sub.get("code2", sub.get("code", ""))
                        for sub in movies[0].get("subtitles", [])
                    } - {""}
        except Exception as e:
            print(f"Bazarr subtitle lookup failed (falling back to disk check): {e}",
                  file=sys.stderr)
        return set()


    def translate_subtitle(subtitle_path, target_lang, media_type, media_id):
        """Ask Bazarr to translate a subtitle file to the target language."""
        params = urllib.parse.urlencode(
            {
                "apikey": BAZARR_APIKEY,
                "action": "translate",
                "language": target_lang,
                "path": subtitle_path,
                "type": media_type,
                "id": media_id,
                "forced": "False",
                "hi": "False",
            }
        )
        req = urllib.request.Request(
            f"{BAZARR_URL}/api/subtitles?{params}", data=b"", method="PATCH"
        )
        try:
            urllib.request.urlopen(req, timeout=600)
            print(f"Translate: {subtitle_path} -> {target_lang}")
        except Exception as e:
            print(f"Translation to {target_lang} failed: {e}", file=sys.stderr)


    def main():
        if len(sys.argv) < 6:
            print("Usage: postprocess.py <directory> <subtitles> <lang_code2> <series_id> <episode_id>",
                  file=sys.stderr)
            sys.exit(1)

        directory = sys.argv[1]
        subtitle_path = sys.argv[2]
        lang_code2 = sys.argv[3]
        series_id = sys.argv[4]
        episode_id = sys.argv[5]

        # Step 1: Targeted Jellyfin refresh
        if directory and JELLYFIN_TOKEN:
            jellyfin_refresh(directory)

        # Step 2: Auto-translate if English subtitle was downloaded
        # Strip :hi / :forced suffixes from language code
        base_lang = lang_code2.split(":")[0] if lang_code2 else ""

        translated = False
        if base_lang == "en" and subtitle_path and BAZARR_APIKEY:
            media_type = "episode" if series_id else "movie"
            media_id = episode_id
            targets = get_translate_targets()
            known = get_known_subtitle_languages(media_type, series_id, episode_id)
            if known:
                print(f"Bazarr knows about subtitles: {sorted(known)}")

            for target in targets:
                if target in known:
                    print(f"Skip: {target} subtitle known to Bazarr")
                    continue
                if subtitle_exists(subtitle_path, target):
                    print(f"Skip: {target} subtitle already on disk")
                    continue
                translate_subtitle(subtitle_path, target, media_type, media_id)
                translated = True

        # Step 3: Refresh Jellyfin again so it picks up translated subtitles
        if translated and directory and JELLYFIN_TOKEN:
            jellyfin_refresh(directory)


    if __name__ == "__main__":
        main()
