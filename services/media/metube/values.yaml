controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/alexta69/metube
          tag: 2026.04.01@sha256:f6231762fb5f36347710dcd9c74a1af66ffa1a4208bf90324f9ea3067484b8ae
        env:
          DOWNLOAD_DIR: "/data/downloads/metube"
          TEMP_DIR: "/data/downloads/metube/.tmp"
          STATE_DIR: "/data/downloads/metube/.metube"
          DELETE_FILE_ON_TRASHCAN: "true"
          DEFAULT_THEME: "auto"
          CHOWN_DIRS: "false"
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8081
          readiness:
            enabled: true
            type: TCP
            port: 8081
          startup:
            enabled: true
            type: TCP
            port: 8081
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8081

persistence:
  config:
    enabled: false
  media:
    enabled: true
