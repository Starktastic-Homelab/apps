controllers:
  main:
    containers:
      main:
        image:
          repository: stirlingtools/stirling-pdf
          tag: latest@sha256:5737322ca558f881f5a7823a53c43b4fe48bf28103f62b2d0f2ec748d0bc5e80
        env:
          SECURITY_ENABLELOGIN: "false"
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8080
          readiness:
            enabled: true
            type: TCP
            port: 8080
          startup:
            enabled: true
            type: TCP
            port: 8080
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8080

persistence:
  config:
    enabled: false
  stirling-pdf-config:
    existingClaim: stirling-pdf-config
    globalMounts:
      - path: /configs
  media:
    enabled: false
