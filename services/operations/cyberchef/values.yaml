controllers:
  main:
    containers:
      main:
        image:
          repository: mpepping/cyberchef
          tag: latest
          digest: sha256:17363416546548735472587b414e3aac152400cce85e94a8e035d8314eb19d5b
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8000
          readiness:
            enabled: true
            type: TCP
            port: 8000
          startup:
            enabled: true
            type: TCP
            port: 8000
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8000

persistence:
  config:
    enabled: false
  media:
    enabled: false
