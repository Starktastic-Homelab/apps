controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/seerr-team/seerr
          tag: v3.1.1@sha256:d535391db3b5a22ce02241e6d7a50ca714e75d927e46aa20456b77fa051cbf52
        env:
          LOG_LEVEL: "info"
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /api/v1/status
            port: 5055
          readiness:
            enabled: true
            type: HTTP
            path: /api/v1/status
            port: 5055
          startup:
            enabled: true
            type: HTTP
            path: /api/v1/status
            port: 5055

service:
  main:
    controller: main
    ports:
      http:
        port: 5055

persistence:
  config:
    # storageClass, type, accessMode inherited from common.yaml
    size: 1Gi
    globalMounts:
      - path: /app/config
