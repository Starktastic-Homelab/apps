apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: paperless-ngx-public
  namespace: operations
spec:
  entryPoints:
    - websecure
  routes:
    # Share links — fully public (document viewing via share slug)
    - match: Host(`paperless.starktastic.net`) && PathPrefix(`/share/`)
      kind: Rule
      services:
        - name: paperless-ngx
          port: 8000
      middlewares:
        - name: crowdsec-bouncer
          namespace: traefik-system
        - name: rate-limit-strong
          namespace: traefik-system
  tls:
    secretName: traefik-system/starktastic-net-tls
