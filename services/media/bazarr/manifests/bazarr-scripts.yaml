---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bazarr-scripts
  namespace: media
data:
  postprocess.py: |
    #!/usr/bin/env python3
    """Bazarr post-processing script.

    1. Refreshes only the affected directory in Jellyfin (not the whole library).
    2. If the downloaded subtitle is English, triggers Lingarr translation to he/ru.
    """

    import json
    import os
    import sys
    import urllib.parse
    import urllib.request

    JELLYFIN_URL = "http://jellyfin-main.media.svc.cluster.local:8096"
    JELLYFIN_TOKEN = os.environ.get("JELLYFIN_API_KEY", "")
    BAZARR_URL = "http://localhost:6767"
    BAZARR_APIKEY = os.environ.get("BAZARR_APIKEY", "")
    TRANSLATE_TARGETS = ["ru", "he"]


    def jellyfin_refresh(directory):
        """Notify Jellyfin that a specific directory was modified."""
        data = json.dumps(
            {"Updates": [{"Path": directory, "UpdateType": "Modified"}]}
        ).encode()
        req = urllib.request.Request(
            f"{JELLYFIN_URL}/Library/Media/Updated",
            data=data,
            headers={
                "X-Emby-Token": JELLYFIN_TOKEN,
                "Content-Type": "application/json",
            },
            method="POST",
        )
        try:
            urllib.request.urlopen(req, timeout=15)
            print(f"Jellyfin: refreshed {directory}")
        except Exception as e:
            print(f"Jellyfin refresh failed: {e}", file=sys.stderr)


    def translate_subtitle(subtitle_path, target_lang, media_type, media_id):
        """Ask Bazarr to translate a subtitle file to the target language."""
        params = urllib.parse.urlencode(
            {
                "apikey": BAZARR_APIKEY,
                "action": "translate",
                "language": target_lang,
                "path": subtitle_path,
                "type": media_type,
                "id": media_id,
                "forced": "False",
                "hi": "False",
            }
        )
        req = urllib.request.Request(
            f"{BAZARR_URL}/api/subtitles?{params}", data=b"", method="PATCH"
        )
        try:
            urllib.request.urlopen(req, timeout=600)
            print(f"Translate: {subtitle_path} -> {target_lang}")
        except Exception as e:
            print(f"Translation to {target_lang} failed: {e}", file=sys.stderr)


    def main():
        directory = os.environ.get("directory", "")
        subtitle_path = os.environ.get("subtitles", "")
        lang_code2 = os.environ.get("subtitles_language_code2", "")
        series_id = os.environ.get("series_id", "")
        episode_id = os.environ.get("episode_id", "")

        # Step 1: Targeted Jellyfin refresh
        if directory and JELLYFIN_TOKEN:
            jellyfin_refresh(directory)

        # Step 2: Auto-translate if English subtitle was downloaded
        # Strip :hi / :forced suffixes from language code
        base_lang = lang_code2.split(":")[0] if lang_code2 else ""

        if base_lang == "en" and subtitle_path and BAZARR_APIKEY:
            media_type = "episode" if series_id else "movie"
            media_id = episode_id

            for target in TRANSLATE_TARGETS:
                translate_subtitle(subtitle_path, target, media_type, media_id)


    if __name__ == "__main__":
        main()
