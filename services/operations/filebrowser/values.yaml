controllers:
  main:
    initContainers:
      init-db-dir:
        image:
          repository: busybox
          tag: latest
        command: ["sh", "-c", "mkdir -p /srv/apps/filebrowser && chown 1000:1000 /srv/apps/filebrowser"]
    containers:
      main:
        image:
          repository: filebrowser/filebrowser
          tag: v2.62.1
          digest: sha256:6a0b050d4a5aae763783137eb3049f4f960428b363d05182c774bf4cc633becc
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        env:
          FB_ROOT: /srv
          FB_DATABASE: /srv/apps/filebrowser/filebrowser.db
          FB_NOAUTH: "true"
        probes:
          liveness:
            enabled: true
            type: HTTP
            port: 80
            path: /health
          readiness:
            enabled: true
            type: HTTP
            port: 80
            path: /health
          startup:
            enabled: true
            type: TCP
            port: 80
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 80

persistence:
  config:
    enabled: false
  apps:
    existingClaim: filebrowser-apps-pvc
    globalMounts:
      - path: /srv/apps
  media:
    enabled: true
    existingClaim: filebrowser-media-pvc
    globalMounts:
      - path: /srv/media
