name: Refresh ArgoCD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  refresh:
    name: Trigger refresh
    runs-on: self-hosted
    container:
      image: buildpack-deps:scm
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine affected applications
        id: guard
        run: |
          # Container git doesn't inherit the runner's safe.directory config
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          # workflow_dispatch always refreshes everything
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "→ Manual dispatch - refreshing all"
            echo "scope=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"

          # First push or force-push with no prior SHA - can't diff, refresh all
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "→ No previous SHA available - refreshing all to be safe"
            echo "scope=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Diffing $BEFORE..${{ github.sha }}"

          # Get changed files - if the before SHA is unreachable (force push / rebase), refresh all
          if ! CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}"); then
            echo "→ git diff failed - refreshing all to be safe"
            echo "scope=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"
          echo "---"

          SCOPE=""
          APP_NAMES=""

          # Walk up from a file path to find the nearest directory containing app.yaml
          find_app_name() {
            local dir
            dir=$(dirname "$1")
            while [ "$dir" != "." ] && [ "$dir" != "/" ]; do
              if [ -f "$dir/app.yaml" ]; then
                basename "$dir"
                return 0
              fi
              dir=$(dirname "$dir")
            done
            return 1
          }

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            case "$file" in
              templates/globals.yaml | templates/ingress-chart/*)
                echo "  $file → all (shared template)"
                SCOPE="all"; break ;;
              bootstrap/*)
                echo "  $file → all (bootstrap)"
                SCOPE="all"; break ;;
              templates/common.yaml)
                echo "  $file → all_services"
                if [ "$SCOPE" = "all_infra" ]; then
                  SCOPE="all"; break
                fi
                SCOPE="all_services" ;;
              templates/infra-common.yaml)
                echo "  $file → all_infra"
                if [ "$SCOPE" = "all_services" ]; then
                  SCOPE="all"; break
                fi
                SCOPE="all_infra" ;;

              infrastructure/base-configs/*)
                echo "  $file → app:base-configs"
                APP_NAMES="$APP_NAMES base-configs" ;;
              infrastructure/configs/*)
                echo "  $file → app:infra-configs"
                APP_NAMES="$APP_NAMES infra-configs" ;;

              services/* | infrastructure/*)
                if name=$(find_app_name "$file"); then
                  echo "  $file → app:$name"
                  APP_NAMES="$APP_NAMES $name"
                else
                  echo "  $file → (no app.yaml ancestor, ignored)"
                fi ;;

              *)
                echo "  $file → (ignored)" ;;
            esac
          done < <(printf '%s\n' "$CHANGED")

          # Determine final scope
          if [ "$SCOPE" = "all" ]; then
            echo "scope=all" >> "$GITHUB_OUTPUT"
          elif [ "$SCOPE" = "all_services" ] || [ "$SCOPE" = "all_infra" ]; then
            UNIQUE_APPS=$(echo "$APP_NAMES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
            echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
            echo "apps=$UNIQUE_APPS" >> "$GITHUB_OUTPUT"
          elif [ -n "$APP_NAMES" ]; then
            UNIQUE_APPS=$(echo "$APP_NAMES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)
            echo "scope=apps" >> "$GITHUB_OUTPUT"
            echo "apps=$UNIQUE_APPS" >> "$GITHUB_OUTPUT"
          else
            echo "scope=skip" >> "$GITHUB_OUTPUT"
          fi

          echo "→ scope=$(grep '^scope=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2)"
          echo "→ apps=$(grep '^apps=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2)"

      - name: Setup Kubeconfig
        if: steps.guard.outputs.scope != 'skip'
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_RAW }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Setup Kubectl
        if: steps.guard.outputs.scope != 'skip'
        uses: azure/setup-kubectl@v5.1.0
        with:
          version: 'latest'

      - name: Setup ArgoCD CLI
        if: steps.guard.outputs.scope != 'skip'
        uses: clowdhaus/argo-cd-action@main
        with:
          command: version
          options: --client

      - name: Refresh applications
        if: steps.guard.outputs.scope != 'skip'
        env:
          SCOPE: ${{ steps.guard.outputs.scope }}
          APPS: ${{ steps.guard.outputs.apps }}
        run: |
          kubectl config set-context --current --namespace=argocd

          refresh_apps() {
            echo "$@" | tr ' ' '\n' | xargs -P 10 -I {} sh -c '
              argocd app get "$1" --core --refresh > /dev/null && echo "✓ $1" || echo "✗ $1"
            ' _ {}
          }

          case "$SCOPE" in
            all)
              echo 'Refreshing all applications...'
              refresh_apps $(argocd app list --core -o name)
              ;;
            all_services)
              echo 'Refreshing all service applications...'
              refresh_apps $(argocd app list --core -l deploy-phase=services -o name)
              if [ -n "$APPS" ]; then
                echo "Also refreshing: $APPS"
                refresh_apps $APPS
              fi
              ;;
            all_infra)
              echo 'Refreshing all infrastructure applications...'
              refresh_apps $(argocd app list --core -l 'deploy-phase in (controllers,crds,foundation)' -o name)
              if [ -n "$APPS" ]; then
                echo "Also refreshing: $APPS"
                refresh_apps $APPS
              fi
              ;;
            apps)
              echo "Refreshing specific applications: $APPS"
              refresh_apps $APPS
              ;;
          esac

          echo 'Refresh complete. ArgoCD will auto-sync changes shortly.'
