apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: media
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: iscsi-pv # source: globals.yaml → global.storageClass (Kustomize-managed, cannot use Helm template)
  resources:
    requests:
      storage: 15Gi
