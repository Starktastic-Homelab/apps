controllers:
  main:
    containers:
      main:
        image:
          repository: mpepping/cyberchef
          tag: latest
          digest: sha256:52ae676f0d1ac1fa301e549b6b12c8c6d7bf13088334c4c2ed0dd47403992cf8
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8000
          readiness:
            enabled: true
            type: TCP
            port: 8000
          startup:
            enabled: true
            type: TCP
            port: 8000
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8000

persistence:
  config:
    enabled: false
  media:
    enabled: false
