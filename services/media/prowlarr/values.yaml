controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/prowlarr
          tag: 2.4.0@sha256:4fd7a166c8f46dd3370a871c250ee577d6c2ae97a0dbe0e3614b5ef736205620
        probes:
          liveness:
            port: 9696
          readiness:
            port: 9696
          startup:
            port: 9696
service:
  main:
    ports:
      http:
        port: 9696

# Prowlarr is an indexer manager and does not need the shared media library
# mounted by the common *arr extras (templates/media-arr-common.yaml).
persistence:
  media:
    enabled: false
