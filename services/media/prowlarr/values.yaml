controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/prowlarr
          tag: 2.4.0@sha256:a46d0ce0a8236bc4e065fe7c91a55d026c9d849620c5845250519b977d8857f3
        probes:
          liveness:
            port: 9696
          readiness:
            port: 9696
          startup:
            port: 9696
service:
  main:
    ports:
      http:
        port: 9696

# Prowlarr is an indexer manager and does not need the shared media library
# mounted by the common *arr extras (templates/media-arr-common.yaml).
persistence:
  media:
    enabled: false
