fullnameOverride: prometheus-blackbox-exporter

replicas: 1

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    memory: 64Mi

# Default chart securityContext drops ALL caps; NET_RAW is required for the
# icmp prober (external-dependency reachability to 1.1.1.1).
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
    add: ["NET_RAW"]

config:
  modules:
    http_2xx:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        method: GET
        follow_redirects: true
        preferred_ip_protocol: "ip4"
    http_auth:
      prober: http
      timeout: 5s
      http:
        valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
        valid_status_codes: [200, 302, 401, 403]
        method: GET
        follow_redirects: false
        preferred_ip_protocol: "ip4"
    icmp:
      prober: icmp
      timeout: 5s
      icmp:
        preferred_ip_protocol: "ip4"
    dns_cloudflare:
      prober: dns
      timeout: 5s
      dns:
        query_name: "cloudflare.com"
        query_type: "A"
        preferred_ip_protocol: "ip4"
    tcp_connect:
      prober: tcp
      timeout: 5s
