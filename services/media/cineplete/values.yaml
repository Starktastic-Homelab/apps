controllers:
  main:
    containers:
      main:
        image:
          repository: sdblepas/cineplete
          tag: v4.4.2@sha256:0a2587afa22454b0f2dd8673cfc6650783effdf51d43ac05a87fbb9c20b89cc6
        probes:
          liveness:
            enabled: true
            type: TCP
            port: 8787
          readiness:
            enabled: true
            type: TCP
            port: 8787
          startup:
            enabled: true
            type: TCP
            port: 8787
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8787

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    storageClass: "nfs-pv"
    size: 1Gi
    accessMode: ReadWriteMany
    globalMounts:
      - path: /data
