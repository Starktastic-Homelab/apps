controllers:
  main:
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/prowlarr
          tag: 2.3.5@sha256:2489c6dbaf11e3a6d71aeb2e6980d04193d4af611aa7064a974851222fd41722
        probes:
          liveness:
            port: 9696
          readiness:
            port: 9696
          startup:
            port: 9696
service:
  main:
    ports:
      http:
        port: 9696

# Prowlarr is an indexer manager and does not need the shared media library
# mounted by the common *arr extras (templates/media-arr-common.yaml).
persistence:
  media:
    enabled: false
