controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/lingarr-translate/lingarr
          tag: 1.2.1@sha256:9e93da3c7c15e49a7e20b92aa28633c93e7db4d19348edfd53e2dc7c9b57e6fe
        env:
          # Translation backend
          SERVICE_TYPE: "libretranslate"
          LIBRE_TRANSLATE_URL: "http://libretranslate.media.svc.cluster.local:5000"

          # Database
          DB_CONNECTION: "postgres"
          DB_HOST: "postgres-postgresql.databases.svc.cluster.local"
          DB_PORT: "5432"
          DB_DATABASE: "lingarr"
          DB_USERNAME: "lingarr"

          # Sonarr / Radarr (EN instances only)
          SONARR_URL: "http://sonarr.media.svc.cluster.local:8989"
          RADARR_URL: "http://radarr.media.svc.cluster.local:7878"

          # Languages
          SOURCE_LANGUAGES: '[{"name":"English","code":"en"}]'
          TARGET_LANGUAGES: '[{"name":"Hebrew","code":"he"},{"name":"Russian","code":"ru"}]'
        envFrom:
          - secretRef:
              name: lingarr-secret
        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /
            port: 8080
          readiness:
            enabled: true
            type: HTTP
            path: /
            port: 8080
          startup:
            enabled: true
            type: HTTP
            path: /
            port: 8080
            spec:
              failureThreshold: 30
              periodSeconds: 5

service:
  main:
    controller: main
    ports:
      http:
        port: 8080

persistence:
  config:
    enabled: false
  lingarr-config:
    type: persistentVolumeClaim
    storageClass: "nfs-pv"
    size: 1Gi
    accessMode: ReadWriteMany
    globalMounts:
      - path: /app/config
  media:
    enabled: true
