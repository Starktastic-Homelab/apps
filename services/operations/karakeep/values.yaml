controllers:
  main:
    containers:
      main:
        image:
          repository: ghcr.io/karakeep-app/karakeep
          tag: 0.31.0@sha256:20754dbdafb11dfe288bbb1c2342a7855081b08ea069e86fcf2d4a2d945d3653
        env:
          DATA_DIR: "/data"
          NEXTAUTH_URL: "https://karakeep.starktastic.net"
          MEILI_ADDR: "http://localhost:7700"
          BROWSER_WEB_URL: "http://localhost:9222"
          DISABLE_PASSWORD_AUTH: "true"
          LOG_LEVEL: "notice"
          # Authentik OIDC
          OAUTH_WELLKNOWN_URL: "https://auth.starktastic.net/application/o/karakeep/.well-known/openid-configuration"
          OAUTH_PROVIDER_NAME: "authentik"
          OAUTH_ALLOW_DANGEROUS_EMAIL_ACCOUNT_LINKING: "true"
        envFrom:
          - secretRef:
              name: karakeep-secret
        probes:
          liveness:
            enabled: true
            type: HTTP
            port: 3000
            path: /
          readiness:
            enabled: true
            type: HTTP
            port: 3000
            path: /
          startup:
            enabled: true
            type: TCP
            port: 3000
            spec:
              failureThreshold: 30
              periodSeconds: 5
      chrome:
        image:
          repository: gcr.io/zenika-hub/alpine-chrome
          tag: "124@sha256:1a0046448e0bb6c275c88f86e01faf0de62b02ec8572901256ada0a8c08be23f"
        args:
          - --no-sandbox
          - --disable-gpu
          - --disable-dev-shm-usage
          - --remote-debugging-address=0.0.0.0
          - --remote-debugging-port=9222
          - --hide-scrollbars
        securityContext:
          capabilities:
            add:
              - SYS_ADMIN
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false
      meilisearch:
        image:
          repository: getmeili/meilisearch
          tag: v1.41.0@sha256:860fa4baed04ae1c235de870edab0c8006227546dea1bbb6411fbfc5e27cf1db
        env:
          MEILI_NO_ANALYTICS: "true"
          MEILI_ENV: "production"
        envFrom:
          - secretRef:
              name: karakeep-secret
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false

service:
  main:
    controller: main
    ports:
      http:
        port: 3000

persistence:
  config:
    enabled: false
  data:
    existingClaim: karakeep-data
    advancedMounts:
      main:
        main:
          - path: /data
  meilisearch:
    existingClaim: karakeep-meilisearch
    advancedMounts:
      main:
        meilisearch:
          - path: /meili_data
