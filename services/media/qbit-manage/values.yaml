controllers:
  main:
    initContainers:
      copy-config:
        image:
          repository: busybox
          tag: stable
        command:
          - sh
          - -c
          - cp /config-source/config.yml /config/config.yml
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
    containers:
      main:
        image:
          repository: ghcr.io/stuffanthings/qbit_manage
          tag: v4.6.6@sha256:e4bb989719c9f3c7218c36f688de03cea2b95f0664fa89ba8095ad7ed0eeefed
        env:
          QBT_SCHEDULE: "30"
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false

service:
  main:
    enabled: false

persistence:
  config:
    enabled: false
  config-dir:
    type: emptyDir
    globalMounts:
      - path: /config
  qbit-config:
    type: configMap
    name: qbit-manage-config
    advancedMounts:
      main:
        copy-config:
          - path: /config-source/config.yml
            subPath: config.yml
            readOnly: true
  media:
    enabled: true
